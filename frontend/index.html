<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S. - Premium 3D AI Assistant</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Three.js Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      overflow: hidden;
      height: 100vh;
      color: #fff;
    }

    #root {
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Three.js Container */
    #three-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ============ GLASSMORPHISM ============ */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-dark {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* ============ GRADIENT ============ */
    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .neon-glow {
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.5), 0 0 60px rgba(59, 130, 246, 0.2);
    }

    /* ============ CHAT ============ */
    .chat-bubble-user {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border-radius: 20px 20px 4px 20px;
      box-shadow: 0 4px 30px rgba(59, 130, 246, 0.3);
    }

    .chat-bubble-ai {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px 20px 20px 4px;
      backdrop-filter: blur(10px);
    }

    /* ============ SIDEBAR ============ */
    .sidebar-item {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: #9ca3af;
      position: relative;
    }

    .sidebar-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: white;
    }

    .sidebar-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: #3b82f6;
      border-radius: 0 3px 3px 0;
    }

    /* ============ VOICE WAVEFORM ============ */
    .waveform-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 60px;
    }

    .waveform-bar {
      width: 4px;
      background: linear-gradient(180deg, #3b82f6, #8b5cf6);
      border-radius: 2px;
      transition: height 0.1s;
    }

    /* ============ ANIMATIONS ============ */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 0.3; }
      100% { transform: scale(0.95); opacity: 0.7; }
    }
    .pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 0 60px rgba(59, 130, 246, 0.6); }
    }
    .glow-pulse { animation: glow-pulse 2s ease-in-out infinite; }

    @keyframes typing-dot {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .typing-dot { animation: typing-dot 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes slide-in {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .slide-in { animation: slide-in 0.3s ease-out; }

    @keyframes fade-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fade-in 0.3s ease-out; }

    /* ============ MARKDOWN ============ */
    .markdown pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5rem 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .markdown code { color: #f472b6; font-size: 0.9em; }
    .markdown h1, .markdown h2, .markdown h3 { font-weight: 600; margin: 0.75rem 0 0.5rem 0; }
    .markdown ul, .markdown ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .markdown li { margin: 0.25rem 0; }
    .markdown blockquote { border-left: 3px solid #3b82f6; padding-left: 1rem; color: #9ca3af; margin: 0.5rem 0; }

    /* ============ SCROLLBAR ============ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .sidebar { width: 64px; }
      .sidebar-label { display: none !important; }
      .mobile-hide { display: none !important; }
    }

    @media (max-width: 480px) {
      .text-3xl { font-size: 1.5rem; }
      .p-6 { padding: 1rem; }
    }

    /* ============ LOADING ============ */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============ TOAST ============ */
    .toast {
      transition: all 0.3s ease;
      transform: translateX(0);
      pointer-events: auto;
    }
    .toast-exit { opacity: 0; transform: translateX(100px); }

    /* ============ BADGE ============ */
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: #ef4444;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }

    /* ============ ROBOT STATUS ============ */
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      transition: all 0.3s;
    }
    .status-idle { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
    .status-listening { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
    .status-thinking { background: #8b5cf6; box-shadow: 0 0 10px #8b5cf6; }
    .status-speaking { background: #06b6d4; box-shadow: 0 0 10px #06b6d4; }
    .status-error { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
  </style>
</head>
<body>

  <!-- ============ 3D CONTAINER ============ -->
  <div id="three-container"></div>

  <!-- ============ ROOT ============ -->
  <div id="root"></div>

  <!-- ============ TOAST ============ -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <!-- ============ MODAL ============ -->
  <div id="modal-container" class="fixed inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm" style="display: none;">
    <div class="glass rounded-2xl p-6 max-w-md w-full mx-4 fade-in">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ============ LOADING ============ -->
  <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0a0a0f]" style="display: none;">
    <div class="text-center">
      <div class="text-6xl mb-4 float">🤖</div>
      <div class="spinner mx-auto"></div>
      <p class="text-gray-400 mt-4">Initializing J.A.R.V.I.S...</p>
    </div>
  </div>

  <!-- ======================================================================== -->
  <!-- COMPLETE JAVASCRIPT - 3D ROBOT + APP -->
  <!-- ======================================================================== -->
  <script>
    // ========================================================================
    // CONFIGURATION - Backend URL
    // ========================================================================
    const CONFIG = {
      // === UPDATE THIS WITH YOUR RENDER BACKEND URL ===
      BACKEND_URL: 'https://my-javis.onrender.com',
      
      // For local development, use:
      // BACKEND_URL: 'http://localhost:10000',
      
      get API_URL() {
        return `${this.BACKEND_URL}/api`;
      }
    };

    // ========================================================================
    // 1. THREE.JS - 3D HUMAN-ROBOT
    // ========================================================================
    (function initRobot() {
      const container = document.getElementById('three-container');

      // ============ SCENE ============
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x0a0a0f, 0.035);

      // ============ CAMERA ============
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 2, 6);
      camera.lookAt(0, 1.5, 0);

      // ============ RENDERER ============
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      container.appendChild(renderer.domElement);

      // ============ LIGHTS ============
      const ambient = new THREE.AmbientLight(0x222244, 0.3);
      scene.add(ambient);

      const keyLight = new THREE.DirectionalLight(0x3b82f6, 2);
      keyLight.position.set(3, 5, 4);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.width = 2048;
      keyLight.shadow.mapSize.height = 2048;
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0x8b5cf6, 1.5);
      rimLight.position.set(-3, 2, -2);
      scene.add(rimLight);

      const fillLight = new THREE.DirectionalLight(0xec4899, 0.5);
      fillLight.position.set(0, -1, 3);
      scene.add(fillLight);

      const blueGlow = new THREE.PointLight(0x3b82f6, 0.5, 5);
      blueGlow.position.set(0, 1.5, 1);
      scene.add(blueGlow);

      // ============ FLOOR GRID ============
      const gridHelper = new THREE.GridHelper(10, 20, 0x3b82f6, 0x1a3a8a);
      gridHelper.position.y = -0.5;
      scene.add(gridHelper);

      // Neon floor glow
      const floorGlowGeometry = new THREE.PlaneGeometry(8, 8);
      const floorGlowMaterial = new THREE.MeshBasicMaterial({
        color: 0x0a0a2e,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
      });
      const floorGlow = new THREE.Mesh(floorGlowGeometry, floorGlowMaterial);
      floorGlow.rotation.x = -Math.PI / 2;
      floorGlow.position.y = -0.48;
      scene.add(floorGlow);

      // ============ PARTICLES ============
      const particleCount = 3000;
      const particleGeo = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 20;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
        sizes[i] = Math.random() * 0.05 + 0.01;
      }
      particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      const particleMat = new THREE.PointsMaterial({
        color: 0x3b82f6,
        size: 0.03,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });
      const particles = new THREE.Points(particleGeo, particleMat);
      scene.add(particles);

      // ============ BUILD ROBOT FROM PRIMITIVES ============
      const robotGroup = new THREE.Group();

      // --- Materials ---
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e,
        metalness: 0.9,
        roughness: 0.1,
        envMapIntensity: 1.0
      });

      const silverMat = new THREE.MeshStandardMaterial({
        color: 0x8899aa,
        metalness: 0.95,
        roughness: 0.05,
        envMapIntensity: 1.2
      });

      const glowMat = new THREE.MeshStandardMaterial({
        color: 0x3b82f6,
        emissive: 0x3b82f6,
        emissiveIntensity: 0.3,
        metalness: 0.5,
        roughness: 0.2
      });

      const eyeMat = new THREE.MeshStandardMaterial({
        color: 0x00ccff,
        emissive: 0x00ccff,
        emissiveIntensity: 1.0,
        metalness: 0.1,
        roughness: 0.1
      });

      const chestMat = new THREE.MeshStandardMaterial({
        color: 0x3b82f6,
        emissive: 0x3b82f6,
        emissiveIntensity: 0.5,
        metalness: 0.3,
        roughness: 0.2,
        transparent: true,
        opacity: 0.9
      });

      // --- Body ---
      const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), bodyMat);
      torso.position.y = 1.2;
      torso.castShadow = true;
      robotGroup.add(torso);

      // Chest plate
      const chest = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.15), chestMat);
      chest.position.set(0, 1.4, 0.35);
      robotGroup.add(chest);

      // Chest hologram ring
      const ringGeo = new THREE.TorusGeometry(0.3, 0.02, 16, 32);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0x3b82f6,
        transparent: true,
        opacity: 0.8
      });
      const chestRing = new THREE.Mesh(ringGeo, ringMat);
      chestRing.position.set(0, 1.4, 0.45);
      robotGroup.add(chestRing);

      // Chest core glow
      const coreGeo = new THREE.SphereGeometry(0.1, 16, 16);
      const coreMat = new THREE.MeshBasicMaterial({
        color: 0x3b82f6,
        transparent: true,
        opacity: 0.9
      });
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.position.set(0, 1.4, 0.5);
      robotGroup.add(core);

      // --- Head ---
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), bodyMat);
      head.position.y = 2.0;
      head.castShadow = true;
      robotGroup.add(head);

      // Helmet visor
      const visor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.1), glowMat);
      visor.position.set(0, 2.05, 0.4);
      robotGroup.add(visor);

      // Eyes
      const eyeGeo = new THREE.SphereGeometry(0.06, 16, 16);
      const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
      leftEye.position.set(-0.15, 2.1, 0.4);
      robotGroup.add(leftEye);

      const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
      rightEye.position.set(0.15, 2.1, 0.4);
      robotGroup.add(rightEye);

      // Eye glow rings
      const eyeRingGeo = new THREE.TorusGeometry(0.08, 0.02, 8, 16);
      const eyeRingMat = new THREE.MeshBasicMaterial({
        color: 0x00ccff,
        transparent: true,
        opacity: 0.5
      });
      const leftEyeRing = new THREE.Mesh(eyeRingGeo, eyeRingMat);
      leftEyeRing.position.copy(leftEye.position);
      robotGroup.add(leftEyeRing);

      const rightEyeRing = new THREE.Mesh(eyeRingGeo, eyeRingMat);
      rightEyeRing.position.copy(rightEye.position);
      robotGroup.add(rightEyeRing);

      // --- Neck ---
      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.2, 8), silverMat);
      neck.position.y = 1.8;
      robotGroup.add(neck);

      // --- Shoulders ---
      const shoulderMat = new THREE.MeshStandardMaterial({
        color: 0x2a2a3e,
        metalness: 0.8,
        roughness: 0.2
      });

      const leftShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), shoulderMat);
      leftShoulder.position.set(-0.55, 1.7, 0);
      robotGroup.add(leftShoulder);

      const rightShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), shoulderMat);
      rightShoulder.position.set(0.55, 1.7, 0);
      robotGroup.add(rightShoulder);

      // --- Arms ---
      const armMat = new THREE.MeshStandardMaterial({
        color: 0x222233,
        metalness: 0.85,
        roughness: 0.15
      });

      const leftArmGroup = new THREE.Group();
      const leftUpper = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.5, 8), armMat);
      leftUpper.position.y = -0.25;
      leftArmGroup.add(leftUpper);

      const leftForearm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.4, 8), armMat);
      leftForearm.position.y = -0.55;
      leftArmGroup.add(leftForearm);

      leftArmGroup.position.set(-0.6, 1.45, 0);
      leftArmGroup.rotation.z = 0.3;
      leftArmGroup.rotation.x = -0.2;
      robotGroup.add(leftArmGroup);

      const rightArmGroup = new THREE.Group();
      const rightUpper = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.5, 8), armMat);
      rightUpper.position.y = -0.25;
      rightArmGroup.add(rightUpper);

      const rightForearm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.4, 8), armMat);
      rightForearm.position.y = -0.55;
      rightArmGroup.add(rightForearm);

      rightArmGroup.position.set(0.6, 1.45, 0);
      rightArmGroup.rotation.z = -0.3;
      rightArmGroup.rotation.x = 0.2;
      robotGroup.add(rightArmGroup);

      // Hands
      const handMat = new THREE.MeshStandardMaterial({
        color: 0x8899aa,
        metalness: 0.9,
        roughness: 0.1
      });
      const handGeo = new THREE.SphereGeometry(0.08, 8, 8);

      const leftHand = new THREE.Mesh(handGeo, handMat);
      leftHand.position.set(-0.6, 0.85, 0);
      robotGroup.add(leftHand);

      const rightHand = new THREE.Mesh(handGeo, handMat);
      rightHand.position.set(0.6, 0.85, 0);
      robotGroup.add(rightHand);

      // --- Legs ---
      const legMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e,
        metalness: 0.8,
        roughness: 0.2
      });

      const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.6, 8), legMat);
      leftLeg.position.set(-0.25, 0.5, 0);
      leftLeg.castShadow = true;
      robotGroup.add(leftLeg);

      const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.6, 8), legMat);
      rightLeg.position.set(0.25, 0.5, 0);
      rightLeg.castShadow = true;
      robotGroup.add(rightLeg);

      // Feet
      const footMat = new THREE.MeshStandardMaterial({
        color: 0x2a2a3e,
        metalness: 0.7,
        roughness: 0.3
      });
      const footGeo = new THREE.BoxGeometry(0.15, 0.05, 0.2);

      const leftFoot = new THREE.Mesh(footGeo, footMat);
      leftFoot.position.set(-0.25, 0.15, 0.05);
      robotGroup.add(leftFoot);

      const rightFoot = new THREE.Mesh(footGeo, footMat);
      rightFoot.position.set(0.25, 0.15, 0.05);
      robotGroup.add(rightFoot);

      // --- Neon Strips ---
      const stripMat = new THREE.MeshBasicMaterial({
        color: 0x3b82f6,
        transparent: true,
        opacity: 0.8
      });

      const vPoints = [
        new THREE.Vector3(-0.2, 0, 0),
        new THREE.Vector3(0, 0.15, 0),
        new THREE.Vector3(0.2, 0, 0)
      ];
      const vCurve = new THREE.CatmullRomCurve3(vPoints);
      const vGeo = new THREE.TubeGeometry(vCurve, 20, 0.015, 8, false);
      const vMesh = new THREE.Mesh(vGeo, stripMat);
      vMesh.position.set(0, 1.2, 0.4);
      robotGroup.add(vMesh);

      const lineMat = new THREE.LineBasicMaterial({ color: 0x3b82f6 });

      for (let side = -1; side <= 1; side += 2) {
        const points = [];
        for (let i = 0; i <= 10; i++) {
          const t = i / 10;
          points.push(new THREE.Vector3(
            side * (0.45 + t * 0.15),
            1.6 + t * 0.3,
            0
          ));
        }
        const curve = new THREE.CatmullRomCurve3(points);
        const curvePoints = curve.getPoints(20);
        const geometry = new THREE.BufferGeometry().setFromPoints(curvePoints);
        const line = new THREE.Line(geometry, lineMat);
        robotGroup.add(line);
      }

      // --- Holographic Display Panels ---
      const panelMat = new THREE.MeshBasicMaterial({
        color: 0x3b82f6,
        transparent: true,
        opacity: 0.1,
        wireframe: true,
        side: THREE.DoubleSide
      });

      const panelPositions = [
        { x: -0.8, y: 1.8, z: -0.5, rx: 0, ry: 0.5 },
        { x: 0.8, y: 1.4, z: -0.5, rx: 0, ry: -0.5 },
        { x: 0, y: 2.6, z: -0.5, rx: 0.3, ry: 0 }
      ];

      panelPositions.forEach(pos => {
        const panel = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.3), panelMat);
        panel.position.set(pos.x, pos.y, pos.z);
        panel.rotation.x = pos.rx || 0;
        panel.rotation.y = pos.ry || 0;
        robotGroup.add(panel);

        const innerMat = new THREE.MeshBasicMaterial({
          color: 0x3b82f6,
          transparent: true,
          opacity: 0.05,
          side: THREE.DoubleSide
        });
        const inner = new THREE.Mesh(new THREE.PlaneGeometry(0.35, 0.25), innerMat);
        inner.position.copy(panel.position);
        inner.rotation.copy(panel.rotation);
        robotGroup.add(inner);
      });

      // --- Position robot ---
      robotGroup.position.y = 0.5;
      scene.add(robotGroup);

      // ============ ANIMATION STATE ============
      const animState = {
        isSpeaking: false,
        isListening: false,
        isThinking: false,
        eyeColor: new THREE.Color(0x00ccff),
        targetEyeColor: new THREE.Color(0x00ccff),
        mouthOpen: 0,
        targetMouthOpen: 0,
        headTilt: 0,
        targetHeadTilt: 0,
        breathing: 0,
        armSwing: 0,
        chestPulse: 0,
        blinkTimer: 0,
        isBlinking: false,
        walkCycle: 0,
        greetingDone: false
      };

      // References
      const eyes = [leftEye, rightEye];
      const eyeRings = [leftEyeRing, rightEyeRing];
      const chestRingRef = chestRing;
      const coreRef = core;
      const leftArmRef = leftArmGroup;
      const rightArmRef = rightArmGroup;

      // ============ MOUSE TRACKING ============
      let mouseX = 0;
      let mouseY = 0;
      let targetMouseX = 0;
      let targetMouseY = 0;

      document.addEventListener('mousemove', (e) => {
        targetMouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        targetMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
      });

      document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        targetMouseX = (touch.clientX / window.innerWidth - 0.5) * 2;
        targetMouseY = (touch.clientY / window.innerHeight - 0.5) * 2;
      });

      // ============ PUBLIC METHODS ============
      window.robot = {
        speak() {
          animState.isSpeaking = true;
          animState.isListening = false;
          animState.isThinking = false;
          animState.targetEyeColor.setHex(0x06b6d4);
          animState.targetMouthOpen = 0.3;
          document.getElementById('status-dot')?.className = 'status-dot status-speaking';
        },
        listen() {
          animState.isListening = true;
          animState.isSpeaking = false;
          animState.isThinking = false;
          animState.targetEyeColor.setHex(0x22c55e);
          animState.targetMouthOpen = 0.1;
          document.getElementById('status-dot')?.className = 'status-dot status-listening';
        },
        think() {
          animState.isThinking = true;
          animState.isListening = false;
          animState.isSpeaking = false;
          animState.targetEyeColor.setHex(0x8b5cf6);
          animState.targetMouthOpen = 0;
          animState.targetHeadTilt = 0.2;
          document.getElementById('status-dot')?.className = 'status-dot status-thinking';
        },
        idle() {
          animState.isSpeaking = false;
          animState.isListening = false;
          animState.isThinking = false;
          animState.targetEyeColor.setHex(0x3b82f6);
          animState.targetMouthOpen = 0;
          animState.targetHeadTilt = 0;
          document.getElementById('status-dot')?.className = 'status-dot status-idle';
        },
        error() {
          animState.targetEyeColor.setHex(0xef4444);
          document.getElementById('status-dot')?.className = 'status-dot status-error';
          setTimeout(() => window.robot.idle(), 2000);
        },
        greet() {
          GSAP.to(robotGroup.position, {
            x: 0,
            duration: 1.5,
            ease: 'power2.out',
            onComplete: () => {
              animState.greetingDone = true;
              window.robot.idle();
            }
          });
          GSAP.to(rightArmRef.rotation, {
            z: -0.8,
            duration: 0.5,
            ease: 'power2.out',
            yoyo: true,
            repeat: 2
          });
        }
      };

      window.robot.idle();

      setTimeout(() => {
        robotGroup.position.x = -3;
        window.robot.greet();
      }, 1000);

      // ============ ANIMATION LOOP ============
      function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.001;

        mouseX += (targetMouseX - mouseX) * 0.05;
        mouseY += (targetMouseY - mouseY) * 0.05;

        robotGroup.rotation.y = mouseX * 0.3;
        robotGroup.rotation.x = -mouseY * 0.1;

        // Breathing
        animState.breathing = Math.sin(time * 1.2) * 0.02;
        torso.scale.y = 1 + animState.breathing;
        torso.position.y = 1.2 + animState.breathing * 0.5;

        // Eye color transition
        const currentColor = animState.eyeColor;
        const targetColor = animState.targetEyeColor;
        currentColor.lerp(targetColor, 0.05);

        eyes.forEach(eye => {
          eye.material.color.copy(currentColor);
          eye.material.emissive.copy(currentColor);
        });
        eyeRings.forEach(ring => {
          ring.material.color.copy(currentColor);
        });

        // Chest pulse
        const pulse = 0.5 + Math.sin(time * 2) * 0.3;
        chestRingRef.scale.set(pulse, pulse, pulse);
        coreRef.material.opacity = 0.5 + Math.sin(time * 2) * 0.4;

        // Blink
        animState.blinkTimer += 0.01;
        if (animState.blinkTimer > 3 + Math.random() * 2) {
          animState.isBlinking = true;
          animState.blinkTimer = 0;
        }
        if (animState.isBlinking) {
          const blinkProgress = (animState.blinkTimer % 0.15) / 0.15;
          const scale = blinkProgress < 0.5 ? 1 - blinkProgress * 2 : 1;
          eyes.forEach(eye => {
            eye.scale.y = Math.max(scale, 0.05);
          });
          if (animState.blinkTimer > 0.3) {
            animState.isBlinking = false;
            eyes.forEach(eye => {
              eye.scale.y = 1;
            });
          }
        }

        // Arm swing
        if (animState.isSpeaking || animState.isThinking) {
          const swing = Math.sin(time * 2) * 0.3;
          leftArmRef.rotation.x = -0.2 + swing * 0.1;
          rightArmRef.rotation.x = 0.2 - swing * 0.1;
        }

        // Head tilt when thinking
        const headTilt = animState.targetHeadTilt * Math.sin(time * 0.5);
        head.rotation.z = headTilt * 0.2;

        // Particles rotation
        particles.rotation.y += 0.0005;

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    })();

    // ========================================================================
    // 2. MAIN APPLICATION
    // ========================================================================
    (function() {
      'use strict';

      // ============ STATE ============
      const state = {
        user: null,
        token: localStorage.getItem('jarvis_token'),
        currentPage: 'chat',
        theme: 'dark',
        messages: [],
        isLoading: false,
        isRecording: false,
        voiceEnabled: true,
        chats: [],
        notes: [],
        tasks: [],
        reminders: [],
        files: [],
        weather: null,
        date: new Date(),
        input: '',
        adminUsers: [],
        adminStats: {},
        toolResult: '',
        toolLoading: false,
        toolActive: 'chat',
        sidebarOpen: true,
        isMobile: window.innerWidth < 768,
        isListening: false,
        recognition: null,
        unreadNotifications: 0,
        currentUtterance: null,
        speechSynthesis: window.speechSynthesis,
        socket: null,
        aiModels: ['gpt-3.5-turbo', 'gpt-4']
      };

      // ============ API ============
      const API = {
        base: CONFIG.API_URL,

        async request(endpoint, options = {}) {
          const headers = {
            'Content-Type': 'application/json',
            ...options.headers
          };

          if (state.token) {
            headers['Authorization'] = `Bearer ${state.token}`;
          }

          try {
            const response = await fetch(`${this.base}${endpoint}`, {
              ...options,
              headers
            });

            if (response.status === 401) {
              localStorage.removeItem('jarvis_token');
              state.token = null;
              render();
              showToast('Session expired. Please login again.', 'error');
              throw new Error('Unauthorized');
            }

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
          } catch (error) {
            if (error.message === 'Unauthorized') throw error;
            throw new Error(error.message || 'Network error');
          }
        },

        async get(endpoint) {
          return this.request(endpoint, { method: 'GET' });
        },

        async post(endpoint, body) {
          return this.request(endpoint, {
            method: 'POST',
            body: JSON.stringify(body)
          });
        },

        async put(endpoint, body) {
          return this.request(endpoint, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
        },

        async delete(endpoint) {
          return this.request(endpoint, { method: 'DELETE' });
        },

        async upload(endpoint, file) {
          const formData = new FormData();
          formData.append('file', file);

          const response = await fetch(`${this.base}${endpoint}`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${state.token}`
            },
            body: formData
          });

          return response.json();
        }
      };

      // ============ RENDER ============
      function render() {
        const root = document.getElementById('root');
        const overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.style.display = 'none';

        if (!state.token) {
          root.innerHTML = renderAuth();
          bindAuthEvents();
          return;
        }

        root.innerHTML = renderApp();
        bindAppEvents();
        loadData();

        const chatInput = document.getElementById('chat-input');
        if (chatInput && state.input) {
          chatInput.value = state.input;
        }
      }

      // ============ AUTH PAGE ============
      function renderAuth() {
        return `

                <input type="password" id="auth-password" placeholder="Password"

                <button type="submit" id="auth-submit"
                  class="w-full py-3 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:opacity-90 transition flex items-center justify-center gap-2">
                  <i class="fa-solid fa-right-to-bracket"></i>
                  <span>Sign In</span>

                <span>🔗 Connected to: ${CONFIG.BACKEND_URL}</span>
              </div>
            </div>
          </div>
        `;
      }

      function bindAuthEvents() {
        let isLogin = true;

        document.getElementById('auth-toggle')?.addEventListener('click', () => {
          isLogin = !isLogin;
          document.getElementById('auth-fields').style.display = isLogin ? 'none' : 'block';
          document.getElementById('auth-submit').innerHTML = isLogin ?
            '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>' :
            '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
          document.getElementById('auth-toggle-text').textContent = isLogin ? "Don't have an account?" :
            'Already have an account?';
          document.getElementById('auth-toggle').textContent = isLogin ? 'Sign Up' : 'Sign In';
        });

        document.getElementById('auth-form')?.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('auth-email').value;
          const password = document.getElementById('auth-password').value;
          const username = document.getElementById('auth-username').value;

          const btn = document.getElementById('auth-submit');
          btn.disabled = true;
          btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>Loading...</span>';

          try {
            const endpoint = isLogin ? '/auth/login' : '/auth/register';
            const body = isLogin ? { email, password } : { username, email, password };
            const data = await API.post(endpoint, body);
            state.token = data.token;
            state.user = data.user;
            localStorage.setItem('jarvis_token', data.token);
            render();
            showToast(isLogin ? 'Welcome back! 👋' : 'Account created! 🎉', 'success');
            if (window.robot) window.robot.idle();
          } catch (error) {
            showToast(error.message || 'Authentication failed', 'error');
            btn.disabled = false;
            btn.innerHTML = isLogin ?
              '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>' :
              '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
          }
        });
      }

      // ============ MAIN APP ============
      function renderApp() {
        return `
          <div class="flex h-screen relative z-10">
            ${renderSidebar()}
            <div class="flex-1 overflow-hidden">
              <div class="glass px-6 py-3 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                  <button id="sidebar-toggle" class="md:hidden text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-bars text-xl"></i>

      // ============ CHAT ============
      function renderChat() {
        return `
          <div class="h-full flex flex-col">
            <div class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar" id="chat-messages">
              ${state.messages.length === 0 ? `
                <div class="h-full flex flex-col items-center justify-center text-center text-gray-500">
                  <div class="text-6xl mb-4 float">🤖</div>
                  <h2 class="text-2xl font-bold text-white">J.A.R.V.I.S. is ready</h2>

                    <button class="quick-prompt px-3 py-1.5 glass rounded-full text-sm text-gray-300 hover:text-white hover:bg-white/10 transition">Summarize this</button>
                    <button class="quick-prompt px-3 py-1.5 glass rounded-full text-sm text-gray-300 hover:text-white hover:bg-white/10 transition">Generate code</button>

                  </div>

              ` : state.messages.map((msg, i) => `

                    ${msg.role === 'assistant' ? renderMarkdown(msg.content) : msg.content}
                    <div class="text-xs ${msg.role === 'user' ? 'text-blue-200' : 'text-gray-500'} mt-2">
                      ${new Date(msg.timestamp || Date.now()).toLocaleTimeString()}

              ${state.isLoading ? `

      // ============ HELPERS ============

      function renderMarkdown(text) {
        if (!text) return '';
        let html = text;
        html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/^[\s]*[-*] (.*$)/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-blue-400 hover:underline">$1</a>');
        html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/\n/g, '<br />');
        return html;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const colors = {
          success: 'border-green-500 text-green-400 bg-green-500/10',
          error: 'border-red-500 text-red-400 bg-red-500/10',
          info: 'border-blue-500 text-blue-400 bg-blue-500/10',
          warning: 'border-yellow-500 text-yellow-400 bg-yellow-500/10'
        };

        const icons = {
          success: 'fa-circle-check',
          error: 'fa-circle-xmark',
          info: 'fa-circle-info',
          warning: 'fa-triangle-exclamation'
        };

        const toast = document.createElement('div');
        toast.className = `glass px-4 py-3 rounded-lg border-l-4 ${colors[type] || colors.info} toast pointer-events-auto flex items-center gap-3`;
        toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span>${message}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.add('toast-exit');
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // ============ CHAT FUNCTIONS ============

      async function sendChatMessage(text) {
        if (!text.trim() || state.isLoading) return;

        const userMessage = { role: 'user', content: text, timestamp: Date.now() };
        state.messages.push(userMessage);
        state.isLoading = true;
        if (window.robot) window.robot.think();
        render();

        try {
          const model = document.getElementById('model-select')?.value || 'gpt-3.5-turbo';

          const response = await fetch(`${API.base}/chat/stream`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${state.token}`
            },
            body: JSON.stringify({
              messages: state.messages.map(m => ({ role: m.role, content: m.content })),
              model
            })
          });

          if (!response.ok) throw new Error('Stream failed');

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullContent = '';
          let firstChunk = true;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                try {
                  const parsed = JSON.parse(data);
                  if (parsed.content) {
                    if (firstChunk) {
                      if (window.robot) window.robot.speak();
                      firstChunk = false;
                    }
                    fullContent += parsed.content;
                    const lastMsg = state.messages[state.messages.length - 1];
                    if (lastMsg && lastMsg.role === 'assistant') {
                      lastMsg.content = fullContent;
                    } else {
                      state.messages.push({ role: 'assistant', content: fullContent, timestamp: Date.now() });
                    }
                    render();
                    const end = document.getElementById('chat-end');
                    if (end) end.scrollIntoView({ behavior: 'smooth' });
                  }
                } catch (e) {}
              }
            }
          }

          if (state.voiceEnabled && fullContent) {
            speakText(fullContent);
          }

          await loadChats();
          if (window.robot) window.robot.idle();
        } catch (error) {
          state.messages.push({ role: 'assistant', content: `⚠️ Error: ${error.message}`, timestamp: Date.now() });
          showToast('Failed to get response', 'error');
          if (window.robot) window.robot.error();
        }

        state.isLoading = false;
        render();
        const end = document.getElementById('chat-end');
        if (end) end.scrollIntoView({ behavior: 'smooth' });
      }

      function speakText(text) {
        if (!state.speechSynthesis) return;
        if (state.currentUtterance) {
          state.speechSynthesis.cancel(state.currentUtterance);
        }

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        utterance.voice = state.speechSynthesis.getVoices().find(v => v.lang.includes('en')) || null;

        utterance.onstart = () => {
          if (window.robot) window.robot.speak();
        };
        utterance.onend = () => {
          if (window.robot) window.robot.idle();
        };
        utterance.onerror = () => {
          if (window.robot) window.robot.idle();
        };

        state.currentUtterance = utterance;
        state.speechSynthesis.speak(utterance);
      }

      function startVoiceRecognition() {
        if (!('webkitSpeechRecognition' in window)) {
          showToast('Voice recognition not supported', 'error');
          return;
        }

        state.isRecording = true;
        if (window.robot) window.robot.listen();
        render();

        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
          let final = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
              final += event.results[i][0].transcript;
            }
          }
          if (final) {
            const input = document.getElementById('chat-input');
            if (input) {
              input.value = final;
              sendChatMessage(final);
            }
          }
        };

        recognition.onend = () => {
          state.isRecording = false;
          if (window.robot) window.robot.idle();
          render();
        };

        recognition.onerror = () => {
          state.isRecording = false;
          if (window.robot) window.robot.error();
          render();
          showToast('Voice recognition error', 'error');
        };

        recognition.start();
      }

          state.adminStats = stats;
          render();
        } catch (error) {
          showToast('Failed to load admin data', 'error');
        }
      }

      function testConnection() {
        fetch(`${API.base}/health`)
          .then(res => res.json())
          .then(data => {
            showToast(`✅ Backend connected! Status: ${data.status}`, 'success');
          })
          .catch(err => {
            showToast(`❌ Connection failed: ${err.message}`, 'error');
          });
      }

      // ============ CLOCK ============

      function updateClock() {
        state.date = new Date();
        const clock = document.getElementById('clock');
        if (clock) clock.textContent = state.date.toLocaleTimeString();
      }

      // ============ EVENT BINDINGS ============

      function bindAppEvents() {
        // Sidebar navigation
        document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
          el.addEventListener('click', () => {
            state.currentPage = el.dataset.page;
            if (state.currentPage === 'admin') loadAdmin();
            render();
          });
        });

        // Tool navigation
        document.querySelectorAll('[data-tool]').forEach(el => {
          el.addEventListener('click', () => {
            state.toolActive = el.dataset.tool;
            state.toolResult = '';
            render();
          });
        });

        // Sidebar toggle
        document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
          const sidebar = document.querySelector('.sidebar');
          if (sidebar) {
            sidebar.classList.toggle('w-20');
            sidebar.classList.toggle('w-64');
          }
        });

        // Logout
        document.getElementById('logout-btn')?.addEventListener('click', () => {
          if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('jarvis_token');
            state.token = null;
            render();
            showToast('Logged out successfully', 'info');
          }
        });

        // Chat
        const sendBtn = document.getElementById('send-btn');
        const chatInput = document.getElementById('chat-input');
        const stopBtn = document.getElementById('stop-btn');
        const clearChat = document.getElementById('clear-chat');

        if (sendBtn && chatInput) {
          const sendMessage = () => {
            const text = chatInput.value.trim();
            if (text && !state.isLoading) {
              chatInput.value = '';
              state.input = '';
              sendChatMessage(text);
            }
          };

          sendBtn.addEventListener('click', sendMessage);
          chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              sendMessage();
            }
          });
          chatInput.addEventListener('input', (e) => {
            state.input = e.target.value;
          });
        }

        if (stopBtn) {
          stopBtn.addEventListener('click', () => {
            state.isLoading = false;
            if (state.currentUtterance) {
              state.speechSynthesis.cancel(state.currentUtterance);
            }
            if (window.robot) window.robot.idle();
            render();
            showToast('Generation stopped', 'warning');
          });
        }

        if (clearChat) {
          clearChat.addEventListener('click', () => {
            if (state.messages.length === 0) return;
            if (confirm('Clear all messages?')) {
              state.messages = [];
              render();
              showToast('Chat cleared', 'info');
            }
          });
        }

        // Quick prompts
        document.querySelectorAll('.quick-prompt').forEach(el => {
          el.addEventListener('click', () => {
            const text = el.textContent.trim();
            const input = document.getElementById('chat-input');
            if (input) {
              input.value = text;
              sendChatMessage(text);
            }
          });
        });

        // Voice toggle
        document.getElementById('voice-toggle')?.addEventListener('click', () => {
          state.voiceEnabled = !state.voiceEnabled;
          if (!state.voiceEnabled && state.currentUtterance) {
            state.speechSynthesis.cancel(state.currentUtterance);
          }
          render();
          showToast(state.voiceEnabled ? 'Voice output enabled' : 'Voice output disabled', 'info');
        });

        // Voice recognition
        document.getElementById('voice-rec-btn')?.addEventListener('click', startVoiceRecognition);

        // Tools
        document.getElementById('tool-generate')?.addEventListener('click', async () => {
          const input = document.getElementById('tool-input');
          if (!input) return;

          state.toolLoading = true;
          state.toolResult = '';
          if (window.robot) window.robot.think();
          render();

          try {
            const endpoints = {
              'code': '/tools/generate-code',
              'image': '/tools/generate-image',
              'summarize': '/tools/summarize',
              'translate': '/tools/translate',
              'grammar': '/tools/fix-grammar',
              'email': '/tools/email-writer',
              'search': '/tools/web-search'
            };

            const endpoint = endpoints[state.toolActive];
            if (!endpoint) {
              state.toolResult = 'Tool not available';
              state.toolLoading = false;
              if (window.robot) window.robot.idle();
              render();
              return;
            }

            const data = await API.post(endpoint, {
              prompt: input.value,
              targetLang: 'Spanish',
              language: 'javascript',
              text: input.value,
              query: input.value
            });

            state.toolResult = data.code || data.url || data.summary || data.translated ||
              data.fixed || data.email || data.result || 'Done!';
            if (window.robot) window.robot.speak();
          } catch (error) {
            state.toolResult = `Error: ${error.message}`;
            if (window.robot) window.robot.error();
          }

          state.toolLoading = false;
          setTimeout(() => { if (window.robot) window.robot.idle(); }, 1000);
          render();
        });

        document.getElementById('tool-clear')?.addEventListener('click', () => {
          const input = document.getElementById('tool-input');
          if (input) input.value = '';
          state.toolResult = '';
          render();
        });

        // Copy button
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const text = btn.closest('.p-4')?.querySelector('.markdown')?.textContent || '';
            if (navigator.clipboard) {
              navigator.clipboard.writeText(text);
              showToast('Copied to clipboard!', 'success');
            }
          });
        });

        // Notes
        document.getElementById('add-note')?.addEventListener('click', async () => {
          const title = prompt('Note title:');
          if (title) {
            const content = prompt('Note content:');
            try {
              await API.post('/notes', { title, content });
              await loadNotes();
              render();
              showToast('Note created!', 'success');
            } catch (error) {
              showToast('Failed to create note', 'error');
            }
          }
        });

        document.querySelectorAll('.delete-note').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this note?')) {
              await API.delete(`/notes/${btn.dataset.id}`);
              await loadNotes();
              render();
            }
          });
        });

        // Tasks
        document.getElementById('add-task')?.addEventListener('click', async () => {
          const title = prompt('Task title:');
          if (title) {
            try {
              await API.post('/tasks', { title, completed: false });
              await loadTasks();
              render();
              showToast('Task added!', 'success');
            } catch (error) {
              showToast('Failed to add task', 'error');
            }
          }
        });

        document.querySelectorAll('.toggle-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            const task = state.tasks.find(t => t._id === btn.dataset.id);
            if (task) {
              await API.put(`/tasks/${task._id}`, { ...task, completed: !task.completed });
              await loadTasks();
              render();
            }
          });
        });

        document.querySelectorAll('.delete-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this task?')) {
              await API.delete(`/tasks/${btn.dataset.id}`);
              await loadTasks();
              render();
            }
          });
        });

        // Files
        document.getElementById('file-upload')?.addEventListener('change', async (e) => {
          const files = e.target.files;
          for (const file of files) {
            try {
              await API.upload('/files/upload', file);
              showToast(`Uploaded: ${file.name}`, 'success');
            } catch (error) {
              showToast(`Failed to upload ${file.name}`, 'error');
            }
          }
          await loadFiles();
          render();
        });

        document.querySelectorAll('.delete-file').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this file?')) {
              await API.delete(`/files/${btn.dataset.id}`);
              await loadFiles();
              render();
            }
          });
        });

        // Settings
        document.getElementById('save-settings')?.addEventListener('click', async () => {
          const model = document.getElementById('settings-model')?.value;
          const voice = document.getElementById('settings-voice')?.value;

          try {
            await API.put('/user/profile', {
              preferences: {
                ...state.user?.preferences,
                aiModel: model,
                voice: voice
              }
            });
            showToast('Settings saved!', 'success');
          } catch (error) {
            showToast('Failed to save settings', 'error');
          }
        });

        // Test Connection
        document.getElementById('test-connection')?.addEventListener('click', testConnection);

        // Notifications
        document.getElementById('notifications-btn')?.addEventListener('click', () => {
          state.unreadNotifications = 0;
          render();
          showToast('No new notifications', 'info');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'k') {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            if (input) input.focus();
          }
        });
      }

      // ============ INIT ============

      // Check for existing session
      if (state.token) {
        API.get('/user/profile')
          .then(user => {
            state.user = user;
            render();
            setInterval(updateClock, 1000);
            loadData();
            if (window.robot) window.robot.idle();
          })
          .catch(() => {
            state.token = null;
            localStorage.removeItem('jarvis_token');
            render();
          });
      } else {
        render();
      }

      // Expose for debugging
      window.__JARVIS = { state, API, render, sendChatMessage, showToast, CONFIG };

      console.log('🤖 J.A.R.V.I.S. Premium v2.0');
      console.log(`📡 Backend: ${CONFIG.BACKEND_URL}`);
      console.log(`📡 API: ${CONFIG.API_URL}`);
      console.log('💡 Press Ctrl+K to focus chat');

    })();
  </script>
</body>
  </html>
