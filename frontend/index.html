<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S. - AI Assistant</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    /* ============ RESET ============ */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: #0a0a0f;
      overflow: hidden;
      height: 100vh;
    }
    
    #root {
      height: 100vh;
      overflow: hidden;
    }
    
    /* ============ SCROLLBAR ============ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }
    
    /* ============ ANIMATIONS ============ */
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 0.3; }
      100% { transform: scale(0.95); opacity: 0.7; }
    }
    .pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 3s ease-in-out infinite; }
    
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    .float-slow { animation: float-slow 6s ease-in-out infinite; }
    
    @keyframes typing-dot {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .typing-dot { 
      animation: typing-dot 1.4s infinite; 
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes slide-in {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .slide-in { animation: slide-in 0.3s ease-out; }
    
    @keyframes fade-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fade-in 0.3s ease-out; }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
    }
    .glow-pulse { animation: glow-pulse 2s ease-in-out infinite; }
    
    @keyframes wave {
      0% { transform: scaleY(0.3); }
      100% { transform: scaleY(1); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* ============ GLASSMORPHISM ============ */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .glass-dark {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .glass-light {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    /* ============ GRADIENT TEXT ============ */
    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* ============ CHAT BUBBLES ============ */
    .chat-bubble-user {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border-radius: 20px 20px 4px 20px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }
    
    .chat-bubble-ai {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px 20px 20px 4px;
      backdrop-filter: blur(10px);
    }
    
    /* ============ SIDEBAR ============ */
    .sidebar-item {
      transition: all 0.2s ease;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: #9ca3af;
      position: relative;
    }
    
    .sidebar-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: white;
    }
    
    .sidebar-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }
    
    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: #3b82f6;
      border-radius: 0 3px 3px 0;
    }
    
    /* ============ MARKDOWN ============ */
    .markdown pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5rem 0;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .markdown code {
      color: #f472b6;
      font-size: 0.9em;
    }
    
    .markdown h1, .markdown h2, .markdown h3 {
      font-weight: 600;
      margin: 0.75rem 0 0.5rem 0;
    }
    
    .markdown ul, .markdown ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }
    
    .markdown li {
      margin: 0.25rem 0;
    }
    
    .markdown blockquote {
      border-left: 3px solid #3b82f6;
      padding-left: 1rem;
      color: #9ca3af;
      margin: 0.5rem 0;
    }
    
    .markdown a {
      color: #3b82f6;
      text-decoration: underline;
    }
    
    /* ============ VOICE WAVEFORM ============ */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 40px;
    }
    
    .waveform-bar {
      width: 3px;
      background: #3b82f6;
      border-radius: 2px;
      animation: wave 0.8s ease-in-out infinite alternate;
    }
    
    .waveform-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
    .waveform-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
    .waveform-bar:nth-child(3) { height: 30px; animation-delay: 0.2s; }
    .waveform-bar:nth-child(4) { height: 25px; animation-delay: 0.3s; }
    .waveform-bar:nth-child(5) { height: 15px; animation-delay: 0.4s; }
    .waveform-bar:nth-child(6) { height: 35px; animation-delay: 0.5s; }
    .waveform-bar:nth-child(7) { height: 20px; animation-delay: 0.6s; }
    .waveform-bar:nth-child(8) { height: 10px; animation-delay: 0.7s; }
    
    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .sidebar { width: 64px; }
      .sidebar-label { display: none !important; }
      .mobile-hide { display: none !important; }
      .mobile-full { width: 100% !important; }
    }
    
    @media (max-width: 480px) {
      .text-3xl { font-size: 1.5rem; }
      .p-6 { padding: 1rem; }
      .gap-4 { gap: 0.75rem; }
    }
    
    /* ============ LOADING SPINNER ============ */
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    /* ============ TOAST ============ */
    .toast {
      transition: all 0.3s ease;
      transform: translateX(0);
      pointer-events: auto;
    }
    
    .toast-exit {
      opacity: 0;
      transform: translateX(100px);
    }
    
    /* ============ LINE CLAMP ============ */
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* ============ SCROLLBAR STYLING ============ */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 2px;
    }
    
    /* ============ NOTIFICATION BADGE ============ */
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: #ef4444;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }
    
    /* ============ INPUT FOCUS ============ */
    .input-focus:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
  </style>
</head>
<body>

  <!-- ============ ROOT CONTAINER ============ -->
  <div id="root"></div>

  <!-- ============ TOAST CONTAINER ============ -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <!-- ============ LOADING OVERLAY ============ -->
  <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0a0a0f] transition-opacity duration-500" style="display: none;">
    <div class="text-center">
      <div class="text-6xl mb-4 float">🤖</div>
      <div class="spinner mx-auto"></div>
      <p class="text-gray-400 mt-4">Loading J.A.R.V.I.S...</p>
    </div>
  </div>

  <!-- ============ MODAL CONTAINER ============ -->
  <div id="modal-container" class="fixed inset-0 z-40 flex items-center justify-center bg-black/50 backdrop-blur-sm" style="display: none;">
    <div class="glass rounded-2xl p-6 max-w-md w-full mx-4 fade-in">
      <div id="modal-content">
        <!-- Modal content will be injected here -->
      </div>
    </div>
  </div>

  <!-- ============ CONTEXT MENU ============ -->
  <div id="context-menu" class="fixed z-50 glass rounded-lg py-1 min-w-[160px] shadow-xl" style="display: none;">
    <div class="px-3 py-2 text-xs text-gray-500 border-b border-white/5">JARVIS</div>
    <div class="context-item px-3 py-2 hover:bg-white/5 cursor-pointer text-sm text-white flex items-center gap-2">
      <i class="fa-regular fa-copy"></i> Copy
    </div>
    <div class="context-item px-3 py-2 hover:bg-white/5 cursor-pointer text-sm text-white flex items-center gap-2">
      <i class="fa-regular fa-comment"></i> Reply
    </div>
    <div class="context-item px-3 py-2 hover:bg-red-500/10 cursor-pointer text-sm text-red-400 flex items-center gap-2">
      <i class="fa-regular fa-trash-can"></i> Delete
    </div>
  </div>

  <!-- ============ NOTIFICATION SOUND ============ -->
  <audio id="notification-sound" preload="auto">
    <source src="data:audio/wav;base64,U3RlcmVv" type="audio/wav">
  </audio>

  <!-- ============ JAVASCRIPT ============ -->
  <script src="app.js"></script>
  
  <!-- ============ INITIALIZATION ============ -->
  <script>
    // Global error handler
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.message);
      const container = document.getElementById('toast-container');
      if (container) {
        const toast = document.createElement('div');
        toast.className = 'glass px-4 py-2 rounded-lg border-l-4 border-red-500 text-red-400 text-sm toast pointer-events-auto';
        toast.textContent = '⚠️ ' + e.message;
        container.appendChild(toast);
        setTimeout(() => {
          toast.classList.add('toast-exit');
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      }
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      // Ctrl+K - Focus chat input
      if (e.ctrlKey && e.key === 'k') {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        if (input) input.focus();
      }
      
      // Escape - Close modals
      if (e.key === 'Escape') {
        document.getElementById('modal-container').style.display = 'none';
        document.getElementById('context-menu').style.display = 'none';
      }
    });
    
    // Click outside context menu
    document.addEventListener('click', function(e) {
      const menu = document.getElementById('context-menu');
      if (menu && !menu.contains(e.target)) {
        menu.style.display = 'none';
      }
    });
    
    console.log('🤖 J.A.R.V.I.S. AI Assistant v2.0');
    console.log('📡 Backend: http://localhost:5000');
    console.log('🔌 WebSocket: ws://localhost:5000');
    console.log('💡 Press Ctrl+K to focus chat');
  </script>

</body>
        </html>
