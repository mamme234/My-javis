<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S. - Premium AI Assistant</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Three.js for 3D -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- GSAP for animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ============ RESET ============ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      overflow: hidden;
      height: 100vh;
      color: #fff;
    }

    #root {
      height: 100vh;
      overflow: hidden;
    }

    /* ============ SCROLLBAR ============ */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 2px;
    }

    /* ============ GLASSMORPHISM ============ */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-dark {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* ============ GRADIENT TEXT ============ */
    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .neon-glow {
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.5), 0 0 60px rgba(59, 130, 246, 0.2);
    }

    /* ============ CHAT BUBBLES ============ */
    .chat-bubble-user {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border-radius: 20px 20px 4px 20px;
      box-shadow: 0 4px 30px rgba(59, 130, 246, 0.3);
    }

    .chat-bubble-ai {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px 20px 20px 4px;
      backdrop-filter: blur(10px);
    }

    /* ============ SIDEBAR ============ */
    .sidebar-item {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: #9ca3af;
      position: relative;
      overflow: hidden;
    }

    .sidebar-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: white;
    }

    .sidebar-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: #3b82f6;
      border-radius: 0 3px 3px 0;
    }

    /* ============ JARVIS ORB ============ */
    #three-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ============ VOICE WAVEFORM ============ */
    .waveform-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 60px;
    }

    .waveform-bar {
      width: 4px;
      background: linear-gradient(180deg, #3b82f6, #8b5cf6);
      border-radius: 2px;
      transition: height 0.1s;
    }

    /* ============ ANIMATIONS ============ */
    @keyframes float {
      0%,
      100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }
    .float {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.95);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.3;
      }
      100% {
        transform: scale(0.95);
        opacity: 0.7;
      }
    }
    .pulse-ring {
      animation: pulse-ring 2s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%,
      100% {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      }
      50% {
        box-shadow: 0 0 60px rgba(59, 130, 246, 0.6);
      }
    }
    .glow-pulse {
      animation: glow-pulse 2s ease-in-out infinite;
    }

    @keyframes typing-dot {
      0%,
      60%,
      100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-10px);
      }
    }
    .typing-dot {
      animation: typing-dot 1.4s infinite;
    }
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes slide-in {
      from {
        transform: translateX(100px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .slide-in {
      animation: slide-in 0.3s ease-out;
    }

    /* ============ MARKDOWN ============ */
    .markdown pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5rem 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .markdown code {
      color: #f472b6;
      font-size: 0.9em;
    }
    .markdown h1,
    .markdown h2,
    .markdown h3 {
      font-weight: 600;
      margin: 0.75rem 0 0.5rem 0;
    }
    .markdown ul,
    .markdown ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }
    .markdown li {
      margin: 0.25rem 0;
    }
    .markdown blockquote {
      border-left: 3px solid #3b82f6;
      padding-left: 1rem;
      color: #9ca3af;
      margin: 0.5rem 0;
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .sidebar {
        width: 64px;
      }
      .sidebar-label {
        display: none !important;
      }
      .mobile-hide {
        display: none !important;
      }
    }

    @media (max-width: 480px) {
      .text-3xl {
        font-size: 1.5rem;
      }
      .p-6 {
        padding: 1rem;
      }
    }

    /* ============ LOADING ============ */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ============ TOAST ============ */
    .toast {
      transition: all 0.3s ease;
      transform: translateX(0);
      pointer-events: auto;
    }
    .toast-exit {
      opacity: 0;
      transform: translateX(100px);
    }

    /* ============ BADGE ============ */
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: #ef4444;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- ============ 3D CONTAINER ============ -->
  <div id="three-container"></div>

  <!-- ============ ROOT ============ -->
  <div id="root"></div>

  <!-- ============ TOAST ============ -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <!-- ============ MODAL ============ -->
  <div id="modal-container" class="fixed inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm" style="display: none;">
    <div class="glass rounded-2xl p-6 max-w-md w-full mx-4 fade-in">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ============ LOADING OVERLAY ============ -->
  <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0a0a0f]" style="display: none;">
    <div class="text-center">
      <div class="text-6xl mb-4 float">🤖</div>
      <div class="spinner mx-auto"></div>
      <p class="text-gray-400 mt-4">Initializing J.A.R.V.I.S...</p>
    </div>
  </div>

  <!-- ============ COMPLETE JAVASCRIPT ============ -->
  <script>
    // ========================================================================
    // 1. THREE.JS - 3D ANIMATED ORB
    // ========================================================================
    (function initThree() {
      const container = document.getElementById('three-container');

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x0a0a0f, 0);
      container.appendChild(renderer.domElement);

      // Particles
      const particlesGeometry = new THREE.BufferGeometry();
      const particlesCount = 2000;
      const posArray = new Float32Array(particlesCount * 3);
      for (let i = 0; i < particlesCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 10;
      }
      particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      const particlesMaterial = new THREE.PointsMaterial({
        size: 0.02,
        color: 0x3b82f6,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
      });
      const particles = new THREE.Points(particlesGeometry, particlesMaterial);
      scene.add(particles);

      // Main Orb
      const orbGeometry = new THREE.SphereGeometry(0.8, 64, 64);
      const orbMaterial = new THREE.MeshPhongMaterial({
        color: 0x3b82f6,
        emissive: 0x1a3a8a,
        emissiveIntensity: 0.5,
        shininess: 100,
        transparent: true,
        opacity: 0.9
      });
      const orb = new THREE.Mesh(orbGeometry, orbMaterial);
      scene.add(orb);

      // Orb glow ring
      const ringGeometry = new THREE.TorusGeometry(1, 0.02, 16, 100);
      const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0x8b5cf6,
        transparent: true,
        opacity: 0.6
      });
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);

      // Orb glow ring 2
      const ring2Geometry = new THREE.TorusGeometry(1.2, 0.01, 16, 100);
      const ring2Material = new THREE.MeshBasicMaterial({
        color: 0xec4899,
        transparent: true,
        opacity: 0.4
      });
      const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
      ring2.rotation.z = Math.PI / 3;
      scene.add(ring2);

      // Lights
      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);

      const light1 = new THREE.PointLight(0x3b82f6, 2, 5);
      light1.position.set(2, 1, 2);
      scene.add(light1);

      const light2 = new THREE.PointLight(0x8b5cf6, 1, 5);
      light2.position.set(-2, -1, 2);
      scene.add(light2);

      const light3 = new THREE.PointLight(0xec4899, 1, 5);
      light3.position.set(0, 2, -2);
      scene.add(light3);

      camera.position.z = 3;

      let mouseX = 0;
      let mouseY = 0;

      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
      });

      function animate() {
        requestAnimationFrame(animate);

        // Rotate particles
        particles.rotation.y += 0.0005;

        // Orb animation
        orb.rotation.x += 0.005;
        orb.rotation.y += 0.01;

        // Ring animations
        ring.rotation.x += 0.01;
        ring.rotation.z += 0.005;
        ring2.rotation.x += 0.005;
        ring2.rotation.y += 0.01;

        // Follow mouse
        orb.position.x += (mouseX * 0.3 - orb.position.x) * 0.05;
        orb.position.y += (-mouseY * 0.3 - orb.position.y) * 0.05;
        ring.position.copy(orb.position);
        ring2.position.copy(orb.position);

        // Pulse
        const scale = 1 + Math.sin(Date.now() * 0.002) * 0.03;
        orb.scale.set(scale, scale, scale);

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    })();

    // ========================================================================
    // 2. MAIN APPLICATION
    // ========================================================================
    (function() {
      'use strict';

      // ============ STATE ============
      const state = {
        user: null,
        token: localStorage.getItem('jarvis_token'),
        currentPage: 'chat',
        theme: 'dark',
        messages: [],
        isLoading: false,
        isRecording: false,
        voiceEnabled: true,
        chats: [],
        notes: [],
        tasks: [],
        reminders: [],
        files: [],
        weather: null,
        date: new Date(),
        input: '',
        adminUsers: [],
        adminStats: {},
        toolResult: '',
        toolLoading: false,
        toolActive: 'chat',
        sidebarOpen: true,
        isMobile: window.innerWidth < 768,
        isListening: false,
        recognition: null,
        unreadNotifications: 0,
        currentUtterance: null,
        speechSynthesis: window.speechSynthesis,
        socket: null,
        aiModels: ['gpt-3.5-turbo', 'gpt-4', 'gemini-pro', 'claude', 'deepseek']
      };

      // ============ API ============
      const API = {
        base: window.location.hostname === 'localhost' ?
          'http://localhost:10000/api' :
          'https://your-backend.onrender.com/api',

        async request(endpoint, options = {}) {
          const headers = {
            'Content-Type': 'application/json',
            ...options.headers
          };

          if (state.token) {
            headers['Authorization'] = `Bearer ${state.token}`;
          }

          try {
            const response = await fetch(`${this.base}${endpoint}`, {
              ...options,
              headers
            });

            if (response.status === 401) {
              localStorage.removeItem('jarvis_token');
              state.token = null;
              render();
              showToast('Session expired. Please login again.', 'error');
              throw new Error('Unauthorized');
            }

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
          } catch (error) {
            if (error.message === 'Unauthorized') throw error;
            throw new Error(error.message || 'Network error');
          }
        },

        async get(endpoint) {
          return this.request(endpoint, { method: 'GET' });
        },

        async post(endpoint, body) {
          return this.request(endpoint, {
            method: 'POST',
            body: JSON.stringify(body)
          });
        },

        async put(endpoint, body) {
          return this.request(endpoint, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
        },

        async delete(endpoint) {
          return this.request(endpoint, { method: 'DELETE' });
        },

        async upload(endpoint, file) {
          const formData = new FormData();
          formData.append('file', file);

          const response = await fetch(`${this.base}${endpoint}`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${state.token}`
            },
            body: formData
          });

          return response.json();
        }
      };

      // ============ RENDER ============
      function render() {
        const root = document.getElementById('root');
        const overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.style.display = 'none';

        if (!state.token) {
          root.innerHTML = renderAuth();
          bindAuthEvents();
          return;
        }

        root.innerHTML = renderApp();
        bindAppEvents();
        loadData();

        const chatInput = document.getElementById('chat-input');
        if (chatInput && state.input) {
          chatInput.value = state.input;
        }
      }

      // ============ AUTH PAGE ============
      function renderAuth() {
        return `
          <div class="min-h-screen flex items-center justify-center p-4 relative" style="
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
          ">
            <div class="glass rounded-2xl p-8 w-full max-w-md relative z-10 fade-in">
              <div class="text-center mb-8">
                <div class="text-6xl mb-3 float">🤖</div>
                <h1 class="text-4xl font-bold gradient-text neon-glow">J.A.R.V.I.S.</h1>
                <p class="text-gray-400 mt-2">Premium AI Assistant</p>
              </div>

              <form id="auth-form" class="space-y-4">
                <div id="auth-fields" style="display: none;">
                  <input type="text" id="auth-username" placeholder="Username"
                    class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                </div>
                <input type="email" id="auth-email" placeholder="Email"
                  class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                <input type="password" id="auth-password" placeholder="Password"
                  class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                <button type="submit" id="auth-submit"
                  class="w-full py-3 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:opacity-90 transition flex items-center justify-center gap-2">
                  <i class="fa-solid fa-right-to-bracket"></i>
                  <span>Sign In</span>
                </button>
              </form>

              <p class="text-center mt-4 text-gray-400">
                <span id="auth-toggle-text">Don't have an account?</span>
                <button id="auth-toggle" class="text-blue-400 hover:underline ml-2">Sign Up</button>
              </p>
            </div>
          </div>
        `;
      }

      function bindAuthEvents() {
        let isLogin = true;

        document.getElementById('auth-toggle')?.addEventListener('click', () => {
          isLogin = !isLogin;
          document.getElementById('auth-fields').style.display = isLogin ? 'none' : 'block';
          document.getElementById('auth-submit').innerHTML = isLogin ?
            '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>' :
            '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
          document.getElementById('auth-toggle-text').textContent = isLogin ? "Don't have an account?" :
            'Already have an account?';
          document.getElementById('auth-toggle').textContent = isLogin ? 'Sign Up' : 'Sign In';
        });

        document.getElementById('auth-form')?.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('auth-email').value;
          const password = document.getElementById('auth-password').value;
          const username = document.getElementById('auth-username').value;

          const btn = document.getElementById('auth-submit');
          btn.disabled = true;
          btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>Loading...</span>';

          try {
            const endpoint = isLogin ? '/auth/login' : '/auth/register';
            const body = isLogin ? { email, password } : { username, email, password };
            const data = await API.post(endpoint, body);
            state.token = data.token;
            state.user = data.user;
            localStorage.setItem('jarvis_token', data.token);
            render();
            showToast(isLogin ? 'Welcome back! 👋' : 'Account created! 🎉', 'success');
            initSocket();
          } catch (error) {
            showToast(error.message || 'Authentication failed', 'error');
            btn.disabled = false;
            btn.innerHTML = isLogin ?
              '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>' :
              '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
          }
        });
      }

      // ============ MAIN APP ============
      function renderApp() {
        return `
          <div class="flex h-screen relative z-10">
            ${renderSidebar()}
            <div class="flex-1 overflow-hidden">
              <div class="glass px-6 py-3 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                  <button id="sidebar-toggle" class="md:hidden text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-bars text-xl"></i>
                  </button>
                  <h2 class="text-lg font-semibold text-white capitalize">${state.currentPage}</h2>
                  <span class="text-xs text-gray-500 bg-white/5 px-2 py-0.5 rounded-full">Premium</span>
                </div>
                <div class="flex items-center gap-3">
                  <button id="notifications-btn" class="text-gray-400 hover:text-white transition relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    ${state.unreadNotifications > 0 ? `<span class="badge">${state.unreadNotifications}</span>` : ''}
                  </button>
                  <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">
                    ${state.user?.username?.charAt(0).toUpperCase() || 'U'}
                  </div>
                </div>
              </div>
              <div class="h-[calc(100%-60px)] overflow-hidden">
                ${state.currentPage === 'dashboard' ? renderDashboard() : ''}
                ${state.currentPage === 'chat' ? renderChat() : ''}
                ${state.currentPage === 'tools' ? renderTools() : ''}
                ${state.currentPage === 'notes' ? renderNotes() : ''}
                ${state.currentPage === 'tasks' ? renderTasks() : ''}
                ${state.currentPage === 'files' ? renderFiles() : ''}
                ${state.currentPage === 'settings' ? renderSettings() : ''}
                ${state.currentPage === 'admin' ? renderAdmin() : ''}
              </div>
            </div>
          </div>
        `;
      }

      // ============ SIDEBAR ============
      function renderSidebar() {
        const pages = [
          { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard' },
          { id: 'chat', icon: 'fa-comment-dots', label: 'Chat' },
          { id: 'tools', icon: 'fa-wand-magic-sparkles', label: 'Tools' },
          { id: 'notes', icon: 'fa-note-sticky', label: 'Notes' },
          { id: 'tasks', icon: 'fa-list-check', label: 'Tasks' },
          { id: 'files', icon: 'fa-folder', label: 'Files' },
          { id: 'settings', icon: 'fa-gear', label: 'Settings' }
        ];

        if (state.user?.isAdmin) {
          pages.push({ id: 'admin', icon: 'fa-users-gear', label: 'Admin' });
        }

        return `
          <div class="sidebar glass-dark w-20 md:w-64 flex flex-col border-r border-white/5 transition-all duration-300">
            <div class="p-4 text-center border-b border-white/5">

      // ============ HELPERS ============

      function renderMarkdown(text) {
        if (!text) return '';
        let html = text;
        html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/^[\s]*[-*] (.*$)/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-blue-400 hover:underline">$1</a>');
        html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/\n/g, '<br />');
        return html;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const colors = {
          success: 'border-green-500 text-green-400 bg-green-500/10',
          error: 'border-red-500 text-red-400 bg-red-500/10',
          info: 'border-blue-500 text-blue-400 bg-blue-500/10',
          warning: 'border-yellow-500 text-yellow-400 bg-yellow-500/10'
        };

        const icons = {
          success: 'fa-circle-check',
          error: 'fa-circle-xmark',
          info: 'fa-circle-info',
          warning: 'fa-triangle-exclamation'
        };

        const toast = document.createElement('div');
        toast.className = `glass px-4 py-3 rounded-lg border-l-4 ${colors[type] || colors.info} toast pointer-events-auto flex items-center gap-3`;
        toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span>${message}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.add('toast-exit');
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // ============ CHAT FUNCTIONS ============

      async function sendChatMessage(text) {
        if (!text.trim() || state.isLoading) return;

        const userMessage = { role: 'user', content: text, timestamp: Date.now() };
        state.messages.push(userMessage);
        state.isLoading = true;
        render();

        try {
          const model = document.getElementById('model-select')?.value || 'gpt-3.5-turbo';

          const response = await fetch(`${API.base}/chat/stream`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${state.token}`
            },
            body: JSON.stringify({
              messages: state.messages.map(m => ({ role: m.role, content: m.content })),
              model
            })
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullContent = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                try {
                  const parsed = JSON.parse(data);
                  if (parsed.content) {
                    fullContent += parsed.content;
                    // Update the last message in real-time
                    const lastMsg = state.messages[state.messages.length - 1];
                    if (lastMsg && lastMsg.role === 'assistant') {
                      lastMsg.content = fullContent;
                    } else {
                      state.messages.push({ role: 'assistant', content: fullContent, timestamp: Date.now() });
                    }
                    render();
                    const end = document.getElementById('chat-end');
                    if (end) end.scrollIntoView({ behavior: 'smooth' });
                  }
                } catch (e) {
                  // Skip invalid JSON
                }
              }
            }
          }

          // Save final message
          if (state.messages.length > 0 && state.messages[state.messages.length - 1].role === 'assistant') {
            // Text-to-speech
            if (state.voiceEnabled) {
              speakText(fullContent);
            }
          }

          await loadChats();
        } catch (error) {
          state.messages.push({ role: 'assistant', content: `Error: ${error.message}`, timestamp: Date.now() });
          showToast('Failed to get response', 'error');
        }

        state.isLoading = false;
        render();
        const end = document.getElementById('chat-end');
        if (end) end.scrollIntoView({ behavior: 'smooth' });
      }

      function speakText(text) {
        if (!state.speechSynthesis) return;
        if (state.currentUtterance) {
          state.speechSynthesis.cancel(state.currentUtterance);
        }

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        utterance.voice = state.speechSynthesis.getVoices().find(v => v.lang.includes('en')) || null;

        state.currentUtterance = utterance;
        state.speechSynthesis.speak(utterance);
      }

      function startVoiceRecognition() {
        if (!('webkitSpeechRecognition' in window)) {
          showToast('Voice recognition not supported', 'error');
          return;
        }

        state.isRecording = true;
        render();

        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
          let final = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
              final += event.results[i][0].transcript;
            }
          }
          if (final) {
            const input = document.getElementById('chat-input');
            if (input) {
              input.value = final;
              sendChatMessage(final);
            }
          }
        };

        recognition.onend = () => {
          state.isRecording = false;
          render();
        };

        recognition.onerror = () => {
          state.isRecording = false;
          render();
          showToast('Voice recognition error', 'error');
        };

        recognition.start();
      }

      // ============ DATA LOADERS ============

      async function loadData() {
        try {
          await Promise.all([loadChats(), loadNotes(), loadTasks(), loadFiles(), loadReminders()]);
        } catch (error) {
          // Silently fail
        }
      }

      async function loadChats() {
        try { state.chats = await API.get('/chat/history'); } catch (e) { state.chats = []; }
      }

      async function loadNotes() {
        try { state.notes = await API.get('/notes'); } catch (e) { state.notes = []; }
      }

      async function loadTasks() {
        try { state.tasks = await API.get('/tasks'); } catch (e) { state.tasks = []; }
      }

      async function loadFiles() {
        try { state.files = await API.get('/files'); } catch (e) { state.files = []; }
      }

      async function loadReminders() {
        try { state.reminders = await API.get('/reminders'); } catch (e) { state.reminders = []; }
      }

      async function loadWeather() {
        try {
          state.weather = await API.get('/weather?city=London');
        } catch (e) {
          state.weather = null;
        }
      }

      async function loadAdmin() {
        try {
          const [users, stats] = await Promise.all([
            API.get('/admin/users'),
            API.get('/admin/stats')
          ]);
          state.adminUsers = users;
          state.adminStats = stats;
          render();
        } catch (error) {
          showToast('Failed to load admin data', 'error');
        }
      }

      // ============ SOCKET.IO ============

      function initSocket() {
        // Socket.IO connection would go here
        // For now, we'll use the existing API
      }

      // ============ CLOCK ============

      function updateClock() {
        state.date = new Date();
        const clock = document.getElementById('clock');
        if (clock) clock.textContent = state.date.toLocaleTimeString();
      }

      // ============ EVENT BINDINGS ============

      function bindAppEvents() {
        // Sidebar navigation
        document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
          el.addEventListener('click', () => {
            state.currentPage = el.dataset.page;
            if (state.currentPage === 'admin') loadAdmin();
            render();
          });
        });

        // Tool navigation
        document.querySelectorAll('[data-tool]').forEach(el => {
          el.addEventListener('click', () => {
            state.toolActive = el.dataset.tool;
            state.toolResult = '';
            render();
          });
        });

        // Sidebar toggle
        document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
          const sidebar = document.querySelector('.sidebar');
          if (sidebar) {
            sidebar.classList.toggle('w-20');
            sidebar.classList.toggle('w-64');
          }
        });

        // Logout
        document.getElementById('logout-btn')?.addEventListener('click', () => {
          if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('jarvis_token');
            state.token = null;
            render();
            showToast('Logged out successfully', 'info');
          }
        });

        // Chat
        const sendBtn = document.getElementById('send-btn');
        const chatInput = document.getElementById('chat-input');
        const stopBtn = document.getElementById('stop-btn');
        const clearChat = document.getElementById('clear-chat');

        if (sendBtn && chatInput) {
          const sendMessage = () => {
            const text = chatInput.value.trim();
            if (text && !state.isLoading) {
              chatInput.value = '';
              state.input = '';
              sendChatMessage(text);
            }
          };

          sendBtn.addEventListener('click', sendMessage);
          chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              sendMessage();
            }
          });
          chatInput.addEventListener('input', (e) => {
            state.input = e.target.value;
          });
        }

        if (stopBtn) {
          stopBtn.addEventListener('click', () => {
            state.isLoading = false;
            if (state.currentUtterance) {
              state.speechSynthesis.cancel(state.currentUtterance);
            }
            render();
            showToast('Generation stopped', 'warning');
          });
        }

        if (clearChat) {
          clearChat.addEventListener('click', () => {
            if (state.messages.length === 0) return;
            if (confirm('Clear all messages?')) {
              state.messages = [];
              render();
              showToast('Chat cleared', 'info');
            }
          });
        }

        // Quick prompts
        document.querySelectorAll('.quick-prompt').forEach(el => {
          el.addEventListener('click', () => {
            const text = el.textContent.trim();
            const input = document.getElementById('chat-input');
            if (input) {
              input.value = text;
              sendChatMessage(text);
            }
          });
        });

        // Voice toggle
        document.getElementById('voice-toggle')?.addEventListener('click', () => {
          state.voiceEnabled = !state.voiceEnabled;
          if (!state.voiceEnabled && state.currentUtterance) {
            state.speechSynthesis.cancel(state.currentUtterance);
          }
          render();
          showToast(state.voiceEnabled ? 'Voice output enabled' : 'Voice output disabled', 'info');
        });

        // Voice recognition
        document.getElementById('voice-rec-btn')?.addEventListener('click', startVoiceRecognition);

        // Tools
        document.getElementById('tool-generate')?.addEventListener('click', async () => {
          const input = document.getElementById('tool-input');
          if (!input) return;

          state.toolLoading = true;
          state.toolResult = '';
          render();

          try {
            const endpoints = {
              'code': '/tools/generate-code',
              'image': '/tools/generate-image',
              'summarize': '/tools/summarize',
              'translate': '/tools/translate',
              'grammar': '/tools/fix-grammar',
              'email': '/tools/email-writer',
              'search': '/tools/web-search'
            };

            const endpoint = endpoints[state.toolActive];
            if (!endpoint) {
              state.toolResult = 'Tool not available';
              state.toolLoading = false;
              render();
              return;
            }

            const data = await API.post(endpoint, {
              prompt: input.value,
              targetLang: 'Spanish',
              language: 'javascript',
              text: input.value,
              query: input.value
            });

            state.toolResult = data.code || data.url || data.summary || data.translated ||
              data.fixed || data.email || data.AbstractText || 'Done!';
          } catch (error) {
            state.toolResult = `Error: ${error.message}`;
          }

          state.toolLoading = false;
          render();
        });

        document.getElementById('tool-clear')?.addEventListener('click', () => {
          const input = document.getElementById('tool-input');
          if (input) input.value = '';
          state.toolResult = '';
          render();
        });

        // Copy button
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const text = btn.closest('.p-4')?.querySelector('.markdown')?.textContent || '';
            if (navigator.clipboard) {
              navigator.clipboard.writeText(text);
              showToast('Copied to clipboard!', 'success');
            }
          });
        });

        // Notes
        document.getElementById('add-note')?.addEventListener('click', async () => {
          const title = prompt('Note title:');
          if (title) {
            const content = prompt('Note content:');
            try {
              await API.post('/notes', { title, content });
              await loadNotes();
              render();
              showToast('Note created!', 'success');
            } catch (error) {
              showToast('Failed to create note', 'error');
            }
          }
        });

        document.querySelectorAll('.delete-note').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this note?')) {
              await API.delete(`/notes/${btn.dataset.id}`);
              await loadNotes();
              render();
            }
          });
        });

        // Tasks
        document.getElementById('add-task')?.addEventListener('click', async () => {
          const title = prompt('Task title:');
          if (title) {
            try {
              await API.post('/tasks', { title, completed: false });
              await loadTasks();
              render();
              showToast('Task added!', 'success');
            } catch (error) {
              showToast('Failed to add task', 'error');
            }
          }
        });

        document.querySelectorAll('.toggle-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            const task = state.tasks.find(t => t._id === btn.dataset.id);
            if (task) {
              await API.put(`/tasks/${task._id}`, { ...task, completed: !task.completed });
              await loadTasks();
              render();
            }
          });
        });

        document.querySelectorAll('.delete-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this task?')) {
              await API.delete(`/tasks/${btn.dataset.id}`);
              await loadTasks();
              render();
            }
          });
        });

        // Files
        document.getElementById('file-upload')?.addEventListener('change', async (e) => {
          const files = e.target.files;
          for (const file of files) {
            try {
              await API.upload('/files/upload', file);
              showToast(`Uploaded: ${file.name}`, 'success');
            } catch (error) {
              showToast(`Failed to upload ${file.name}`, 'error');
            }
          }
          await loadFiles();
          render();
        });

        document.querySelectorAll('.delete-file').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this file?')) {
              await API.delete(`/files/${btn.dataset.id}`);
              await loadFiles();
              render();
            }
          });
        });

        // Settings
        document.getElementById('save-settings')?.addEventListener('click', async () => {
          const model = document.getElementById('settings-model')?.value;
          const voice = document.getElementById('settings-voice')?.value;
          const wakeWord = document.getElementById('settings-wake')?.value;

          try {
            await API.put('/user/profile', {
              preferences: {
                ...state.user?.preferences,
                aiModel: model,
                voice: voice,
                wakeWord: wakeWord
              }
            });
            showToast('Settings saved!', 'success');
          } catch (error) {
            showToast('Failed to save settings', 'error');
          }
        });

        // Notifications
        document.getElementById('notifications-btn')?.addEventListener('click', () => {
          state.unreadNotifications = 0;
          render();
          showToast('No new notifications', 'info');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'k') {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            if (input) input.focus();
          }
        });
      }

      // ============ INIT ============

      // Check for existing session
      if (state.token) {
        API.get('/user/profile')
          .then(user => {
            state.user = user;
            render();
            setInterval(updateClock, 1000);
            loadWeather();
            loadData();
            initSocket();
          })
          .catch(() => {
            state.token = null;
            localStorage.removeItem('jarvis_token');
            render();
          });
      } else {
        render();
      }

      // Expose for debugging
      window.__JARVIS = { state, API, render, sendChatMessage, showToast };

      console.log('🤖 J.A.R.V.I.S. Premium v2.0');
      console.log('📡 Backend:', API.base);
      console.log('💡 Press Ctrl+K to focus chat');

    })();
  </script>
