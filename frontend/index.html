<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S. PRO - AI Assistant</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    #root {
      min-height: 100vh;
    }

    /* ============ GLASSMORPHISM ============ */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-dark {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-light {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* ============ GRADIENT ============ */
    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gradient-text-gold {
      background: linear-gradient(135deg, #f59e0b, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .neon-glow {
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.5), 0 0 60px rgba(59, 130, 246, 0.2);
    }

    .neon-glow-gold {
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.5), 0 0 60px rgba(245, 158, 11, 0.2);
    }

    /* ============ LOGO ============ */
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-10px) scale(1.02); }
    }
    .logo-float {
      animation: logoFloat 4s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .logo-pulse {
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spin-slow {
      animation: spin-slow 20s linear infinite;
    }

    /* ============ CHAT ============ */
    .chat-bubble-user {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border-radius: 20px 20px 4px 20px;
      box-shadow: 0 4px 30px rgba(59, 130, 246, 0.3);
    }

    .chat-bubble-ai {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px 20px 20px 4px;
      backdrop-filter: blur(10px);
    }

    /* ============ SIDEBAR ============ */
    .sidebar-item {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: #9ca3af;
      position: relative;
      overflow: hidden;
    }

    .sidebar-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: white;
      transform: translateX(4px);
    }

    .sidebar-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: #3b82f6;
      border-radius: 0 3px 3px 0;
    }

    /* ============ STATUS ============ */
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      transition: all 0.3s;
    }
    .status-online { background: #22c55e; box-shadow: 0 0 15px #22c55e; }
    .status-offline { background: #ef4444; box-shadow: 0 0 15px #ef4444; }
    .status-away { background: #f59e0b; box-shadow: 0 0 15px #f59e0b; }

    /* ============ SCROLLBAR ============ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }

    /* ============ ANIMATIONS ============ */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 0.3; }
      100% { transform: scale(0.95); opacity: 0.7; }
    }
    .pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }

    @keyframes typing-dot {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .typing-dot { animation: typing-dot 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes slide-in {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .slide-in { animation: slide-in 0.3s ease-out; }

    @keyframes fade-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fade-in 0.3s ease-out; }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 0 60px rgba(59, 130, 246, 0.6); }
    }
    .glow-pulse { animation: glow-pulse 2s ease-in-out infinite; }

    /* ============ SPINNER ============ */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============ TOAST ============ */
    .toast {
      transition: all 0.3s ease;
      transform: translateX(0);
      pointer-events: auto;
    }
    .toast-exit {
      opacity: 0;
      transform: translateX(100px);
    }

    /* ============ MARKDOWN ============ */
    .markdown pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5rem 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .markdown code { color: #f472b6; font-size: 0.9em; }
    .markdown h1, .markdown h2, .markdown h3 { font-weight: 600; margin: 0.75rem 0 0.5rem 0; }
    .markdown ul, .markdown ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .markdown li { margin: 0.25rem 0; }
    .markdown blockquote { border-left: 3px solid #3b82f6; padding-left: 1rem; color: #9ca3af; margin: 0.5rem 0; }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .sidebar { width: 64px; }
      .sidebar-label { display: none !important; }
      .mobile-hide { display: none !important; }
    }

    @media (max-width: 480px) {
      .text-3xl { font-size: 1.5rem; }
      .p-6 { padding: 1rem; }
    }

    /* ============ BADGE ============ */
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: #ef4444;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }

    /* ============ PRO FEATURES ============ */
    .pro-badge {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .feature-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .feature-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(59, 130, 246, 0.3);
    }

    /* ============ WAVEFORM ============ */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 30px;
    }
    .waveform-bar {
      width: 3px;
      background: #3b82f6;
      border-radius: 2px;
      animation: wave 0.8s ease-in-out infinite alternate;
    }
    .waveform-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
    .waveform-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
    .waveform-bar:nth-child(3) { height: 24px; animation-delay: 0.2s; }
    .waveform-bar:nth-child(4) { height: 20px; animation-delay: 0.3s; }
    .waveform-bar:nth-child(5) { height: 12px; animation-delay: 0.4s; }
    .waveform-bar:nth-child(6) { height: 28px; animation-delay: 0.5s; }
    .waveform-bar:nth-child(7) { height: 16px; animation-delay: 0.6s; }
    .waveform-bar:nth-child(8) { height: 8px; animation-delay: 0.7s; }
    @keyframes wave {
      0% { transform: scaleY(0.3); }
      100% { transform: scaleY(1); }
    }
  </style>
</head>
<body>

  <div id="root"></div>
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <script>
    // ========================================================================
    // CONFIGURATION
    // ========================================================================
    const CONFIG = {
      BACKEND_URL: 'https://my-javis.onrender.com',
    };

    // ========================================================================
    // JARVIS PRO APPLICATION
    // ========================================================================
    (function() {
      'use strict';

      // ============ STATE ============
      const state = {
        user: null,
        token: localStorage.getItem('jarvis_token'),
        currentPage: 'dashboard',
        messages: [],
        isLoading: false,
        isRecording: false,
        voiceEnabled: true,
        chats: [],
        notes: [],
        tasks: [],
        files: [],
        weather: null,
        date: new Date(),
        input: '',
        adminUsers: [],
        adminStats: {},
        toolResult: '',
        toolLoading: false,
        toolActive: 'chat',
        isConnected: false,
        theme: 'dark',
        sidebarOpen: true,
        isMobile: window.innerWidth < 768
      };

      // ============ API ============
      const API = {
        base: CONFIG.BACKEND_URL + '/api',

        async request(endpoint, options = {}) {
          const headers = {
            'Content-Type': 'application/json',
            ...options.headers
          };
          if (state.token) {
            headers['Authorization'] = `Bearer ${state.token}`;
          }
          try {
            const response = await fetch(`${this.base}${endpoint}`, { ...options, headers });
            if (response.status === 401) {
              localStorage.removeItem('jarvis_token');
              state.token = null;
              render();
              showToast('Session expired. Please login again.', 'error');
              throw new Error('Unauthorized');
            }
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
          } catch (error) {
            if (error.message === 'Unauthorized') throw error;
            throw new Error(error.message || 'Network error');
          }
        },
        async get(endpoint) { return this.request(endpoint, { method: 'GET' }); },
        async post(endpoint, body) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(body) }); },
        async put(endpoint, body) { return this.request(endpoint, { method: 'PUT', body: JSON.stringify(body) }); },
        async delete(endpoint) { return this.request(endpoint, { method: 'DELETE' }); }
      };

      // ============ CHECK CONNECTION ============
      async function checkConnection() {
        try {
          const response = await fetch(`${API.base}/health`);
          state.isConnected = response.ok;
          updateStatusDots();
        } catch {
          state.isConnected = false;
          updateStatusDots();
        }
      }

      function updateStatusDots() {
        document.querySelectorAll('.status-dot').forEach(dot => {
          dot.className = `status-dot ${state.isConnected ? 'status-online' : 'status-offline'}`;
        });
        document.querySelectorAll('.status-text').forEach(el => {
          el.textContent = state.isConnected ? 'Online' : 'Offline';
        });
      }

      // ============ RENDER ============
      function render() {
        const root = document.getElementById('root');
        if (!state.token) {
          root.innerHTML = renderAuth();
          bindAuthEvents();
          checkConnection();
          return;
        }
        root.innerHTML = renderApp();
        bindAppEvents();
        loadData();
        checkConnection();
        const chatInput = document.getElementById('chat-input');
        if (chatInput && state.input) chatInput.value = state.input;
      }

      // ============ AUTH PAGE ============
      function renderAuth() {
        return `
          <div class="min-h-screen flex items-center justify-center p-4" style="
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
          ">
            <div class="fixed inset-0 overflow-hidden pointer-events-none">
              <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
              <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
              <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-pink-500/5 rounded-full blur-3xl"></div>
            </div>

            <div class="glass rounded-2xl p-8 w-full max-w-md relative z-10 fade-in">
              <div class="text-center mb-8">
                <div class="text-5xl font-bold gradient-text neon-glow logo-float logo-pulse">J.A.R.V.I.S.</div>
                <div class="text-sm text-gray-500 mt-1">PRO</div>
                <p class="text-gray-400 mt-2">Premium AI Assistant</p>
                <div class="flex items-center justify-center gap-2 mt-3">
                  <span class="status-dot status-online" id="auth-status-dot"></span>
                  <span class="text-xs text-gray-500 status-text" id="auth-status-text">Online</span>
                </div>
              </div>

              <form id="auth-form" class="space-y-4">
                <div id="auth-fields" style="display: none;">
                  <input type="text" id="auth-username" placeholder="Username"
                    class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                </div>
                <input type="email" id="auth-email" placeholder="Email"
                  class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                <input type="password" id="auth-password" placeholder="Password"
                  class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                <button type="submit" id="auth-submit"
                  class="w-full py-3 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:opacity-90 transition flex items-center justify-center gap-2">
                  <i class="fa-solid fa-right-to-bracket"></i>
                  <span>Sign In</span>
                </button>
              </form>

              <p class="text-center mt-4 text-gray-400">
                <span id="auth-toggle-text">Don't have an account?</span>
                <button id="auth-toggle" class="text-blue-400 hover:underline ml-2">Sign Up</button>
              </p>

              <div class="mt-6 flex justify-center gap-4 text-xs text-gray-500">
                <span>🔒 Secure</span>
                <span>•</span>
                <span>⚡ AI Powered</span>
                <span>•</span>
                <span>🌟 Premium</span>
              </div>
            </div>
          </div>
        `;
      }

      function bindAuthEvents() {
        let isLogin = true;
        document.getElementById('auth-toggle')?.addEventListener('click', () => {
          isLogin = !isLogin;
          document.getElementById('auth-fields').style.display = isLogin ? 'none' : 'block';
          document.getElementById('auth-submit').innerHTML = isLogin ?
            '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>' :
            '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
          document.getElementById('auth-toggle-text').textContent = isLogin ? "Don't have an account?" :
            'Already have an account?';
          document.getElementById('auth-toggle').textContent = isLogin ? 'Sign Up' : 'Sign In';
        });

        document.getElementById('auth-form')?.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('auth-email').value;
          const password = document.getElementById('auth-password').value;
          const username = document.getElementById('auth-username').value;
          const btn = document.getElementById('auth-submit');
          btn.disabled = true;
          btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>Loading...</span>';
          try {
            const endpoint = isLogin ? '/auth/login' : '/auth/register';
            const body = isLogin ? { email, password } : { username, email, password };
            const data = await API.post(endpoint, body);
            state.token = data.token;
            state.user = data.user;
            localStorage.setItem('jarvis_token', data.token);
            render();
            showToast(isLogin ? 'Welcome back! 👋' : 'Account created! 🎉', 'success');
          } catch (error) {
            showToast(error.message || 'Authentication failed', 'error');
            btn.disabled = false;
            btn.innerHTML = isLogin ?
              '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>' :
              '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
          }
        });
      }

      // ============ MAIN APP ============
      function renderApp() {
        return `
          <div class="flex h-screen bg-[#0a0a0f]">
            ${renderSidebar()}
            <div class="flex-1 overflow-hidden">
              <div class="glass px-6 py-3 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                  <button id="sidebar-toggle" class="md:hidden text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-bars text-xl"></i>
                  </button>
                  <span class="text-lg font-bold gradient-text">J.A.R.V.I.S.</span>
                  <span class="pro-badge">PRO</span>
                  <span class="status-dot ${state.isConnected ? 'status-online' : 'status-offline'}" id="header-status-dot"></span>
                </div>
                <div class="flex items-center gap-4">
                  <button id="notifications-btn" class="text-gray-400 hover:text-white transition relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                  </button>
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">
                      ${state.user?.username?.charAt(0).toUpperCase() || 'U'}
                    </div>
                    <span class="text-sm text-gray-300 hidden md:block">${state.user?.username || 'User'}</span>
                  </div>
                </div>
              </div>
              <div class="h-[calc(100%-60px)] overflow-hidden">
                ${state.currentPage === 'dashboard' ? renderDashboard() : ''}
                ${state.currentPage === 'chat' ? renderChat() : ''}
                ${state.currentPage === 'tools' ? renderTools() : ''}
                ${state.currentPage === 'notes' ? renderNotes() : ''}
                ${state.currentPage === 'tasks' ? renderTasks() : ''}
                ${state.currentPage === 'files' ? renderFiles() : ''}
                ${state.currentPage === 'settings' ? renderSettings() : ''}
                ${state.currentPage === 'admin' ? renderAdmin() : ''}
              </div>
            </div>
          </div>
        `;
      }

      // ============ SIDEBAR ============
      function renderSidebar() {
        const pages = [
          { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard' },
          { id: 'chat', icon: 'fa-comment-dots', label: 'Chat' },
          { id: 'tools', icon: 'fa-wand-magic-sparkles', label: 'AI Tools' },
          { id: 'notes', icon: 'fa-note-sticky', label: 'Notes' },
          { id: 'tasks', icon: 'fa-list-check', label: 'Tasks' },
          { id: 'files', icon: 'fa-folder', label: 'Files' },
          { id: 'settings', icon: 'fa-gear', label: 'Settings' }
        ];
        if (state.user?.isAdmin) {
          pages.push({ id: 'admin', icon: 'fa-users-gear', label: 'Admin' });
        }

        return `
          <div class="sidebar glass-dark w-20 md:w-64 flex flex-col border-r border-white/5 transition-all duration-300">
            <div class="p-4 text-center border-b border-white/5">
              <div class="text-xl md:text-2xl font-bold gradient-text neon-glow">J.A.R.V.I.S.</div>
              <div class="text-xs text-gray-500 hidden md:block">PRO v3.0</div>
            </div>

            <nav class="flex-1 p-2 space-y-1 overflow-y-auto custom-scrollbar">
              ${pages.map(p => `
                <div class="sidebar-item ${state.currentPage === p.id ? 'active' : ''}" data-page="${p.id}">
                  <i class="fa-solid ${p.icon} w-5 text-center"></i>
                  <span class="sidebar-label hidden md:inline">${p.label}</span>
                  ${p.id === 'chat' ? `<span class="ml-auto text-xs text-gray-500 hidden md:block">${state.chats.length}</span>` : ''}
                </div>
              `).join('')}
            </nav>

            <div class="p-4 border-t border-white/5">
              <div class="flex items-center gap-3 px-2 py-2">
                <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">
                  ${state.user?.username?.charAt(0).toUpperCase() || 'U'}
                </div>
                <div class="hidden md:block flex-1">
                  <div class="text-sm font-medium text-white truncate">${state.user?.username || 'User'}</div>
                  <div class="text-xs text-gray-500 truncate">${state.user?.email || ''}</div>
                </div>
                <div class="hidden md:block text-xs text-gray-500">${state.user?.subscription === 'premium' ? '⭐' : '🆓'}</div>
              </div>
              <button id="logout-btn" class="w-full mt-2 flex items-center gap-3 px-2 py-2 rounded-lg text-red-400 hover:bg-red-500/10 transition">
                <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
                <span class="hidden md:inline">Logout</span>
              </button>
            </div>
          </div>
        `;
      }

      // ============ DASHBOARD ============

              `).join('')}
            </div>
            <div class="glass rounded-lg overflow-hidden">
              <div class="overflow-x-auto">
                <table class="w-full">
                  <thead class="bg-white/5">
                    <tr>
                      <th class="px-4 py-3 text-left text-gray-400 text-sm">User</th>
                      <th class="px-4 py-3 text-left text-gray-400 text-sm">Email</th>
                      <th class="px-4 py-3 text-left text-gray-400 text-sm">Subscription</th>
                      <th class="px-4 py-3 text-left text-gray-400 text-sm">Chats</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${state.adminUsers.map(user => `
                      <tr class="border-t border-white/5 hover:bg-white/5 transition">
                        <td class="px-4 py-3 text-white">${user.username}</td>
                        <td class="px-4 py-3 text-gray-400 text-sm">${user.email}</td>
                        <td class="px-4 py-3">
                          <span class="px-2 py-1 rounded text-xs ${user.subscription === 'premium' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-gray-700 text-gray-400'}">${user.subscription || 'free'}</span>
                        </td>
                        <td class="px-4 py-3 text-gray-400">${user.usage?.chats || 0}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        `;
      }

      // ============ HELPERS ============
      function renderMarkdown(text) {
        if (!text) return '';
        let html = text;
        html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/^[\s]*[-*] (.*$)/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-blue-400 hover:underline">$1</a>');
        html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/\n/g, '<br />');
        return html;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        if (!container) return;
        const colors = {
          success: 'border-green-500 text-green-400 bg-green-500/10',
          error: 'border-red-500 text-red-400 bg-red-500/10',
          info: 'border-blue-500 text-blue-400 bg-blue-500/10',
          warning: 'border-yellow-500 text-yellow-400 bg-yellow-500/10'
        };
        const icons = {
          success: 'fa-circle-check',
          error: 'fa-circle-xmark',
          info: 'fa-circle-info',
          warning: 'fa-triangle-exclamation'
        };
        const toast = document.createElement('div');
        toast.className = `glass px-4 py-3 rounded-lg border-l-4 ${colors[type] || colors.info} toast pointer-events-auto flex items-center gap-3`;
        toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.classList.add('toast-exit');
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // ============ CHAT FUNCTIONS ============
      async function sendChatMessage(text) {
        if (!text.trim() || state.isLoading) return;
        const userMessage = { role: 'user', content: text, timestamp: Date.now() };
        state.messages.push(userMessage);
        state.isLoading = true;
        render();
        try {
          const response = await API.post('/chat', {
            messages: state.messages.map(m => ({ role: m.role, content: m.content })),
            model: 'gpt-3.5-turbo'
          });
          state.messages.push({ role: 'assistant', content: response.content, timestamp: Date.now() });
          if (state.voiceEnabled) speakText(response.content);
          await loadChats();
        } catch (error) {
          state.messages.push({ role: 'assistant', content: `⚠️ Error: ${error.message}`, timestamp: Date.now() });
          showToast('Failed to get response', 'error');
        }
        state.isLoading = false;
        render();
        const end = document.getElementById('chat-end');
        if (end) end.scrollIntoView({ behavior: 'smooth' });
      }

      function speakText(text) {
        if (!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
      }

      // ============ DATA LOADERS ============
      async function loadData() {
        try { await Promise.all([loadChats(), loadNotes(), loadTasks(), loadFiles(), loadWeather()]); } catch {}
      }
      async function loadChats() { try { state.chats = await API.get('/chat/history'); } catch { state.chats = []; } }
      async function loadNotes() { try { state.notes = await API.get('/notes'); } catch { state.notes = []; } }
      async function loadTasks() { try { state.tasks = await API.get('/tasks'); } catch { state.tasks = []; } }
      async function loadFiles() { try { state.files = await API.get('/files'); } catch { state.files = []; } }
      async function loadWeather() { try { state.weather = await API.get('/weather?city=London'); } catch { state.weather = null; } }
      async function loadAdmin() { try { const [users, stats] = await Promise.all([API.get('/admin/users'), API.get('/admin/stats')]); state.adminUsers = users; state.adminStats = stats; render(); } catch {} }

      // ============ BIND EVENTS ============
      function bindAppEvents() {
        // Sidebar navigation
        document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
          el.addEventListener('click', () => {
            state.currentPage = el.dataset.page;
            if (state.currentPage === 'admin') loadAdmin();
            render();
          });
        });

        // Tool navigation
        document.querySelectorAll('[data-tool]').forEach(el => {
          el.addEventListener('click', () => {
            state.toolActive = el.dataset.tool;
            state.toolResult = '';
            render();
          });
        });

        // Quick actions
        document.querySelectorAll('.quick-action').forEach((el, index) => {
          el.addEventListener('click', () => {
            const actions = ['chat', 'notes', 'tasks', 'files'];
            state.currentPage = actions[index] || 'chat';
            render();
          });
        });

        // Sidebar toggle
        document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
          const sidebar = document.querySelector('.sidebar');
          if (sidebar) { sidebar.classList.toggle('w-20'); sidebar.classList.toggle('w-64'); }
        });

        // Logout
        document.getElementById('logout-btn')?.addEventListener('click', () => {
          if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('jarvis_token');
            state.token = null;
            render();
            showToast('Logged out successfully', 'info');
          }
        });

        // Chat
        const sendBtn = document.getElementById('send-btn');
        const chatInput = document.getElementById('chat-input');
        if (sendBtn && chatInput) {
          const sendMessage = () => {
            const text = chatInput.value.trim();
            if (text && !state.isLoading) { chatInput.value = ''; state.input = ''; sendChatMessage(text); }
          };
          sendBtn.addEventListener('click', sendMessage);
          chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
              sendMessage(); } });
          chatInput.addEventListener('input', (e) => { state.input = e.target.value; });
        }

        // Stop button
        document.getElementById('stop-btn')?.addEventListener('click', () => {
          state.isLoading = false;
          render();
          showToast('Generation stopped', 'warning');
        });

        // Clear chat
        document.getElementById('clear-chat')?.addEventListener('click', () => {
          if (state.messages.length === 0) return;
          if (confirm('Clear all messages?')) { state.messages = []; render();
            showToast('Chat cleared', 'info'); }
        });

        // Voice toggle
        document.getElementById('voice-toggle')?.addEventListener('click', () => {
          state.voiceEnabled = !state.voiceEnabled;
          render();
          showToast(state.voiceEnabled ? 'Voice output enabled' : 'Voice output disabled', 'info');
        });

        // Quick prompts
        document.querySelectorAll('.quick-prompt').forEach(el => {
          el.addEventListener('click', () => {
            const text = el.textContent.trim();
            const input = document.getElementById('chat-input');
            if (input) { input.value = text;
              sendChatMessage(text); }
          });
        });

        // Tools
        document.getElementById('tool-generate')?.addEventListener('click', async () => {
          const input = document.getElementById('tool-input');
          if (!input) return;
          state.toolLoading = true;
          state.toolResult = '';
          render();
          try {
            const endpoints = { 'code': '/tools/generate-code', 'image': '/tools/generate-image',
              'summarize': '/tools/summarize', 'translate': '/tools/translate', 'grammar': '/tools/fix-grammar',
              'email': '/tools/email-writer' };
            const endpoint = endpoints[state.toolActive];
            if (!endpoint) { state.toolResult = 'Tool not available';
              state.toolLoading = false;
              render(); return; }
            const data = await API.post(endpoint, { prompt: input.value, targetLang: 'Spanish', language: 'javascript',
                text: input.value });
            state.toolResult = data.code || data.url || data.summary || data.translated || data.fixed || data.email ||
              'Done!';
          } catch (error) { state.toolResult = `Error: ${error.message}`; }
          state.toolLoading = false;
          render();
        });

        document.getElementById('tool-clear')?.addEventListener('click', () => {
          const input = document.getElementById('tool-input');
          if (input) input.value = '';
          state.toolResult = '';
          render();
        });

        // Notes
        document.getElementById('add-note')?.addEventListener('click', async () => {
          const title = prompt('Note title:');
          if (title) {
            const content = prompt('Note content:');
            try { await API.post('/notes', { title, content });
              await loadNotes();
              render();
              showToast('Note created!', 'success'); } catch { showToast('Failed to create note', 'error'); }
          }
        });

        document.querySelectorAll('.delete-note').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this note?')) { await API.delete(`/notes/${btn.dataset.id}`);
              await loadNotes();
              render(); }
          });
        });

        // Tasks
        document.getElementById('add-task')?.addEventListener('click', async () => {
          const title = prompt('Task title:');
          if (title) {
            try { await API.post('/tasks', { title, completed: false });
              await loadTasks();
              render();
              showToast('Task added!', 'success'); } catch { showToast('Failed to add task', 'error'); }
          }
        });

        document.querySelectorAll('.toggle-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            const task = state.tasks.find(t => t._id === btn.dataset.id);
            if (task) { await API.put(`/tasks/${task._id}`, { ...task, completed: !task.completed });
              await loadTasks();
              render(); }
          });
        });

        document.querySelectorAll('.delete-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this task?')) { await API.delete(`/tasks/${btn.dataset.id}`);
              await loadTasks();
              render(); }
          });
        });

        // Files
        document.getElementById('file-upload')?.addEventListener('change', async (e) => {
          const files = e.target.files;
          for (const file of files) {
            try {
              const formData = new FormData();
              formData.append('file', file);
              const response = await fetch(`${API.base}/files/upload`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${state.token}` },
                body: formData
              });
              if (response.ok) showToast(`Uploaded: ${file.name}`, 'success');
              else showToast(`Failed to upload ${file.name}`, 'error');
            } catch { showToast(`Failed to upload ${file.name}`, 'error'); }
          }
          await loadFiles();
          render();
        });

        document.querySelectorAll('.delete-file').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this file?')) { await API.delete(`/files/${btn.dataset.id}`);
              await loadFiles();
              render(); }
          });
        });

        // Settings
        document.getElementById('save-settings')?.addEventListener('click', async () => {
          const voice = document.getElementById('settings-voice')?.value;
          const wakeWord = document.getElementById('settings-wake')?.value;
          try {
            await API.put('/user/profile', { preferences: { ...state.user?.preferences, voice, wakeWord } });
            showToast('Settings saved!', 'success');
          } catch { showToast('Failed to save settings', 'error'); }
        });

        // Theme
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.theme-btn').forEach(b => {
              b.className =
                'theme-btn px-4 py-2 rounded-lg bg-gray-700 text-gray-400 border border-transparent';
            });
            btn.className = 'theme-btn px-4 py-2 rounded-lg bg-blue-500/20 text-blue-400 border border-blue-500/30';
            state.theme = btn.dataset.theme;
            showToast(`Theme changed to ${state.theme}`, 'info');
          });
        });

        // Test connection
        document.getElementById('test-connection')?.addEventListener('click', () => {
          fetch(`${API.base}/health`).then(res => res.json()).then(data => {
            showToast(`✅ Backend connected! Status: ${data.status}`, 'success');
          }).catch(() => { showToast('❌ Connection failed', 'error'); });
        });

        // Notifications
        document.getElementById('notifications-btn')?.addEventListener('click', () => {
          showToast('No new notifications', 'info');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'k') { e.preventDefault(); const input = document.getElementById('chat-input'); if (
              input) input.focus(); }
        });
      }

      // ============ INIT ============
      if (state.token) {
        API.get('/user/profile').then(user => {
          state.user = user;
          render();
          setInterval(() => { state.date = new Date(); const clock = document.getElementById('clock'); if (clock) clock
              .textContent = state.date.toLocaleTimeString(); }, 1000);
          loadData();
        }).catch(() => { state.token = null;
          localStorage.removeItem('jarvis_token');
          render(); });
      } else { render(); }

      window.__JARVIS = { state, API, render, sendChatMessage, showToast, CONFIG };
      console.log('🤖 J.A.R.V.I.S. PRO v3.0');
      console.log(`📡 Backend: ${CONFIG.BACKEND_URL}`);
      console.log('💡 Press Ctrl+K to focus chat');

    })();
  </script>
</body>
  </html>
