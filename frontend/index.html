<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S. - AI Assistant</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    /* ============ RESET ============ */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: #0a0a0f;
      overflow: hidden;
      height: 100vh;
    }
    
    #root {
      height: 100vh;
      overflow: hidden;
    }
    
    /* ============ SCROLLBAR ============ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }
    
    /* ============ ANIMATIONS ============ */
    @keyframes pulse-ring {
      0%, 100% { transform: scale(0.95); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 0.3; }
    }
    .pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 3s ease-in-out infinite; }
    
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    .float-slow { animation: float-slow 6s ease-in-out infinite; }
    
    @keyframes typing-dot {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .typing-dot { 
      animation: typing-dot 1.4s infinite; 
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes slide-in {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .slide-in { animation: slide-in 0.3s ease-out; }
    
    @keyframes fade-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fade-in 0.3s ease-out; }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
    }
    .glow-pulse { animation: glow-pulse 2s ease-in-out infinite; }
    
    @keyframes wave {
      0% { transform: scaleY(0.3); }
      100% { transform: scaleY(1); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* ============ GLASSMORPHISM ============ */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .glass-dark {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .glass-light {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    /* ============ GRADIENT TEXT ============ */
    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* ============ CHAT BUBBLES ============ */
    .chat-bubble-user {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border-radius: 20px 20px 4px 20px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }
    
    .chat-bubble-ai {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px 20px 20px 4px;
      backdrop-filter: blur(10px);
    }
    
    /* ============ SIDEBAR ============ */
    .sidebar-item {
      transition: all 0.2s ease;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: #9ca3af;
      position: relative;
    }
    
    .sidebar-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: white;
    }
    
    .sidebar-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }
    
    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: #3b82f6;
      border-radius: 0 3px 3px 0;
    }
    
    /* ============ MARKDOWN ============ */
    .markdown pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5rem 0;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .markdown code {
      color: #f472b6;
      font-size: 0.9em;
    }
    
    .markdown h1, .markdown h2, .markdown h3 {
      font-weight: 600;
      margin: 0.75rem 0 0.5rem 0;
    }
    
    .markdown ul, .markdown ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }
    
    .markdown li {
      margin: 0.25rem 0;
    }
    
    .markdown blockquote {
      border-left: 3px solid #3b82f6;
      padding-left: 1rem;
      color: #9ca3af;
      margin: 0.5rem 0;
    }
    
    .markdown a {
      color: #3b82f6;
      text-decoration: underline;
    }
    
    /* ============ VOICE WAVEFORM ============ */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 40px;
    }
    
    .waveform-bar {
      width: 3px;
      background: #3b82f6;
      border-radius: 2px;
      animation: wave 0.8s ease-in-out infinite alternate;
    }
    
    .waveform-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
    .waveform-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
    .waveform-bar:nth-child(3) { height: 30px; animation-delay: 0.2s; }
    .waveform-bar:nth-child(4) { height: 25px; animation-delay: 0.3s; }
    .waveform-bar:nth-child(5) { height: 15px; animation-delay: 0.4s; }
    .waveform-bar:nth-child(6) { height: 35px; animation-delay: 0.5s; }
    .waveform-bar:nth-child(7) { height: 20px; animation-delay: 0.6s; }
    .waveform-bar:nth-child(8) { height: 10px; animation-delay: 0.7s; }
    
    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .sidebar { width: 64px; }
      .sidebar-label { display: none !important; }
      .mobile-hide { display: none !important; }
      .mobile-full { width: 100% !important; }
    }
    
    @media (max-width: 480px) {
      .text-3xl { font-size: 1.5rem; }
      .p-6 { padding: 1rem; }
      .gap-4 { gap: 0.75rem; }
    }
    
    /* ============ LOADING SPINNER ============ */
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    /* ============ TOAST ============ */
    .toast {
      transition: all 0.3s ease;
      transform: translateX(0);
      pointer-events: auto;
    }
    
    .toast-exit {
      opacity: 0;
      transform: translateX(100px);
    }
    
    /* ============ LINE CLAMP ============ */
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* ============ SCROLLBAR STYLING ============ */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 2px;
    }
    
    /* ============ NOTIFICATION BADGE ============ */
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: #ef4444;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }
    
    /* ============ INPUT FOCUS ============ */
    .input-focus:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    
    /* ============ TOOLTIP ============ */
    .tooltip {
      position: relative;
    }
    .tooltip:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 8px;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 11px;
      border-radius: 4px;
      white-space: nowrap;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <!-- ============ ROOT CONTAINER ============ -->
  <div id="root"></div>

  <!-- ============ TOAST CONTAINER ============ -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <!-- ============ LOADING OVERLAY ============ -->
  <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0a0a0f] transition-opacity duration-500" style="display: none;">
    <div class="text-center">
      <div class="text-6xl mb-4 float">🤖</div>
      <div class="spinner mx-auto"></div>
      <p class="text-gray-400 mt-4">Loading J.A.R.V.I.S...</p>
    </div>
  </div>

  <!-- ============ MODAL CONTAINER ============ -->
  <div id="modal-container" class="fixed inset-0 z-40 flex items-center justify-center bg-black/50 backdrop-blur-sm" style="display: none;">
    <div class="glass rounded-2xl p-6 max-w-md w-full mx-4 fade-in">
      <div id="modal-content">
        <!-- Modal content will be injected here -->
      </div>
    </div>
  </div>

  <!-- ============ CONTEXT MENU ============ -->
  <div id="context-menu" class="fixed z-50 glass rounded-lg py-1 min-w-[160px] shadow-xl" style="display: none;">
    <div class="px-3 py-2 text-xs text-gray-500 border-b border-white/5">JARVIS</div>
    <div class="context-item px-3 py-2 hover:bg-white/5 cursor-pointer text-sm text-white flex items-center gap-2">
      <i class="fa-regular fa-copy"></i> Copy
    </div>
    <div class="context-item px-3 py-2 hover:bg-white/5 cursor-pointer text-sm text-white flex items-center gap-2">
      <i class="fa-regular fa-comment"></i> Reply
    </div>
    <div class="context-item px-3 py-2 hover:bg-red-500/10 cursor-pointer text-sm text-red-400 flex items-center gap-2">
      <i class="fa-regular fa-trash-can"></i> Delete
    </div>
  </div>

  <!-- ============ NOTIFICATION SOUND ============ -->
  <audio id="notification-sound" preload="auto">
    <source src="data:audio/wav;base64,U3RlcmVv" type="audio/wav">
  </audio>

  <!-- ============ JAVASCRIPT - COMPLETE APP ============ -->
  <script>
    // ========================================================================
    // J.A.R.V.I.S. AI ASSISTANT - COMPLETE APPLICATION
    // ========================================================================
    (function() {
      'use strict';

      // ============ STATE ============
      const state = {
        user: null,
        token: localStorage.getItem('jarvis_token'),
        currentPage: 'chat',
        theme: 'dark',
        messages: [],
        isLoading: false,
        isRecording: false,
        voiceEnabled: true,
        chats: [],
        notes: [],
        tasks: [],
        reminders: [],
        memories: [],
        files: [],
        weather: null,
        date: new Date(),
        input: '',
        adminUsers: [],
        adminStats: {},
        toolResult: '',
        toolLoading: false,
        toolActive: 'chat',
        sidebarOpen: true,
        isMobile: window.innerWidth < 768,
        isListening: false,
        recognition: null,
        unreadNotifications: 0,
        isTyping: false,
        notificationSound: null,
        speechSynthesis: window.speechSynthesis,
        currentUtterance: null
      };

      // ============ API ============
      const API = {
        base: 'http://localhost:5000/api',
        
        async request(endpoint, options = {}) {
          const headers = {
            'Content-Type': 'application/json',
            ...options.headers
          };
          
          if (state.token) {
            headers['Authorization'] = `Bearer ${state.token}`;
          }
          
          try {
            const response = await fetch(`${this.base}${endpoint}`, {
              ...options,
              headers
            });
            
            if (response.status === 401) {
              localStorage.removeItem('jarvis_token');
              state.token = null;
              render();
              showToast('Session expired. Please login again.', 'error');
              throw new Error('Unauthorized');
            }
            
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
          } catch (error) {
            if (error.message === 'Unauthorized') throw error;
            throw new Error(error.message || 'Network error');
          }
        },
        
        async get(endpoint) {
          return this.request(endpoint, { method: 'GET' });
        },
        
        async post(endpoint, body) {
          return this.request(endpoint, {
            method: 'POST',
            body: JSON.stringify(body)
          });
        },
        
        async put(endpoint, body) {
          return this.request(endpoint, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
        },
        
        async delete(endpoint) {
          return this.request(endpoint, { method: 'DELETE' });
        },
        
        async upload(endpoint, file) {
          const formData = new FormData();
          formData.append('file', file);
          
          const response = await fetch(`${this.base}${endpoint}`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${state.token}`
            },
            body: formData
          });
          
          return response.json();
        }
      };

      // ============ RENDER ENGINE ============
      function render() {
        const root = document.getElementById('root');
        
        const overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.style.display = 'none';
        
        if (!state.token) {
          root.innerHTML = renderAuth();
          bindAuthEvents();
          return;
        }
        
        root.innerHTML = renderApp();
        bindAppEvents();
        
        switch(state.currentPage) {
          case 'chat': loadChats(); break;
          case 'dashboard': loadDashboard(); break;
          case 'notes': loadNotes(); break;
          case 'tasks': loadTasks(); break;
          case 'admin': loadAdmin(); break;
        }
        
        updateClock();
        
        const chatInput = document.getElementById('chat-input');
        if (chatInput && state.input) {
          chatInput.value = state.input;
        }
      }

      // ============ AUTH PAGE ============
      function renderAuth() {
        return `
          <div id="auth-container" class="min-h-screen flex items-center justify-center p-4" style="
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
          ">
            <div class="fixed inset-0 overflow-hidden pointer-events-none">
              <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
              <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
              <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-pink-500/5 rounded-full blur-3xl"></div>
            </div>
            
            <div class="glass rounded-2xl p-8 w-full max-w-md relative z-10 fade-in">
              <div class="text-center mb-8">
                <div class="text-6xl mb-3 float-slow">🤖</div>
                <h1 class="text-4xl font-bold gradient-text">J.A.R.V.I.S.</h1>
                <p class="text-gray-400 mt-2">Your AI Assistant</p>
                <div class="flex justify-center gap-1 mt-3">
                  <span class="w-1.5 h-1.5 bg-blue-400 rounded-full"></span>
                  <span class="w-1.5 h-1.5 bg-purple-400 rounded-full"></span>
                  <span class="w-1.5 h-1.5 bg-pink-400 rounded-full"></span>
                </div>
              </div>
              
              <form id="auth-form" class="space-y-4">
                <div id="auth-fields" style="display: none;">
                  <div class="relative">
                    <i class="fa-regular fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="auth-username" placeholder="Username" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" required />
                  </div>
                </div>
                
                <div class="relative">
                  <i class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                  <input type="email" id="auth-email" placeholder="Email" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" required />
                </div>
                
                <div class="relative">
                  <i class="fa-regular fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                  <input type="password" id="auth-password" placeholder="Password" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" required />
                </div>
                
                <button type="submit" id="auth-submit" class="w-full py-3 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:opacity-90 transition disabled:opacity-50 flex items-center justify-center gap-2">
                  <i class="fa-solid fa-right-to-bracket"></i>
                  <span>Sign In</span>
                </button>
              </form>
              
              <p class="text-center mt-4 text-gray-400">
                <span id="auth-toggle-text">Don't have an account?</span>
                <button id="auth-toggle" class="text-blue-400 hover:underline ml-2 transition">Sign Up</button>
              </p>
              
              <div class="mt-6 flex justify-center gap-4 text-gray-600 text-xs">
                <span>🔒 Secure</span>
                <span>•</span>
                <span>⚡ Fast</span>
                <span>•</span>
                <span>🤖 AI Powered</span>
              </div>
            </div>
          </div>
        `;
      }

      function bindAuthEvents() {
        let isLogin = true;
        
        const toggleBtn = document.getElementById('auth-toggle');
        const usernameField = document.getElementById('auth-fields');
        const submitBtn = document.getElementById('auth-submit');
        const toggleText = document.getElementById('auth-toggle-text');
        
        if (toggleBtn) {
          toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            usernameField.style.display = isLogin ? 'none' : 'block';
            submitBtn.innerHTML = isLogin 
              ? '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>'
              : '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
            toggleText.textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
            toggleBtn.textContent = isLogin ? 'Sign Up' : 'Sign In';
          });
        }
        
        const form = document.getElementById('auth-form');
        if (form) {
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value;
            
            const submitBtn = document.getElementById('auth-submit');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>Loading...</span>';
            
            try {
              const endpoint = isLogin ? '/auth/login' : '/auth/register';
              const body = isLogin ? { email, password } : { username, email, password };
              const data = await API.post(endpoint, body);
              state.token = data.token;
              state.user = data.user;
              localStorage.setItem('jarvis_token', data.token);
              render();
              showToast(isLogin ? 'Welcome back! 👋' : 'Account created! 🎉', 'success');
            } catch (error) {
              showToast(error.message || 'Authentication failed', 'error');
              submitBtn.disabled = false;
              submitBtn.innerHTML = isLogin 
                ? '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>'
                : '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
            }
          });
        }
      }

      // ============ MAIN APP ============
      function renderApp() {
        return `
          <div id="app-container" class="flex h-screen bg-[#0a0a0f]">
            ${renderSidebar()}
            <div id="main-content" class="flex-1 overflow-hidden relative">
              <div class="glass px-6 py-3 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                  <button id="sidebar-toggle" class="md:hidden text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-bars text-xl"></i>
                  </button>
                  <h2 class="text-lg font-semibold text-white capitalize">${state.currentPage}</h2>
                  <span class="text-xs text-gray-500 bg-white/5 px-2 py-0.5 rounded-full">v2.0</span>
                </div>
                <div class="flex items-center gap-3">
                  <button id="notifications-btn" class="text-gray-400 hover:text-white transition relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    ${state.unreadNotifications > 0 ? `<span class="badge">${state.unreadNotifications}</span>` : ''}
                  </button>
                  <button id="user-menu-btn" class="flex items-center gap-2 text-gray-400 hover:text-white transition">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">
                      ${state.user?.username?.charAt(0).toUpperCase() || 'U'}
                    </div>
                    <span class="hidden sm:inline text-sm">${state.user?.username || 'User'}</span>
                    <i class="fa-solid fa-chevron-down text-xs"></i>
                  </button>
                </div>
              </div>
              
              <div id="page-content" class="h-[calc(100%-60px)] overflow-hidden">
                ${state.currentPage === 'dashboard' ? renderDashboard() : ''}
                ${state.currentPage === 'chat' ? renderChat() : ''}
                ${state.currentPage === 'tools' ? renderTools() : ''}
                ${state.currentPage === 'notes' ? renderNotes() : ''}
                ${state.currentPage === 'tasks' ? renderTasks() : ''}
                ${state.currentPage === 'settings' ? renderSettings() : ''}
                ${state.currentPage === 'admin' ? renderAdmin() : ''}
              </div>
            </div>
          </div>
        `;
      }

      // ============ SIDEBAR ============
      function renderSidebar() {
        const pages = [
          { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard' },
          { id: 'chat', icon: 'fa-comment-dots', label: 'Chat' },
          { id: 'tools', icon: 'fa-wand-magic-sparkles', label: 'Tools' },
          { id: 'notes', icon: 'fa-note-sticky', label: 'Notes' },
          { id: 'tasks', icon: 'fa-list-check', label: 'Tasks' },
          { id: 'settings', icon: 'fa-gear', label: 'Settings' }
        ];
        
        if (state.user?.isAdmin) {
          pages.push({ id: 'admin', icon: 'fa-users-gear', label: 'Admin' });
        }
        
        return `
          <div class="sidebar glass-dark w-20 md:w-64 flex flex-col border-r border-white/5 transition-all duration-300">
            <div class="p-4 text-center border-b border-white/5">
              <div class="text-2xl md:text-3xl font-bold gradient-text">JARVIS</div>
              <div class="text-xs text-gray-500 hidden md:block">v2.0</div>
            </div>
            
            <nav class="flex-1 p-2 space-y-1 overflow-y-auto custom-scrollbar">

                  <span class="sidebar-label hidden md:inline">${p.label}</span>
                  ${p.id === 'chat' ? `<span class="ml-auto text-xs text-gray-500 hidden md:block">${state.chats.length}</span>` : ''}

                  ${state.user?.username?.charAt(0).toUpperCase() || 'U'}
                </div>
                <div class="hidden md:block flex-1">
                  <div class="text-sm font-medium text-white">${state.user?.username || 'User'}</div>
                  <div class="text-xs text-gray-500 truncate">${state.user?.email || ''}</div>
                </div>
                <div class="hidden md:block text-xs text-gray-500">
                  ${state.user?.subscription === 'premium' ? '⭐' : '🆓'}

      // ============ DASHBOARD ============
      function renderDashboard() {
        const hour = new Date().getHours();
        const greeting = hour < 12 ? 'Morning' : hour < 18 ? 'Afternoon' : 'Evening';
        
        return `
          <div id="dashboard-content" class="h-full overflow-y-auto p-6 custom-scrollbar">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div class="md:col-span-2 rounded-2xl p-8 relative overflow-hidden" style="
                background: linear-gradient(135deg, #1a1a2e, #3b82f6);
              ">
                <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
                <div class="relative z-10">
                  <h1 class="text-3xl font-bold text-white">Good ${greeting}, ${state.user?.username || 'User'}! 👋</h1>
                  <p class="text-blue-200 mt-2">How can JARVIS assist you today?</p>
                  <div class="flex gap-2 mt-4 flex-wrap">
                    <span class="px-3 py-1 bg-white/10 rounded-full text-xs text-white">💬 ${state.chats.length} chats</span>
                    <span class="px-3 py-1 bg-white/10 rounded-full text-xs text-white">📝 ${state.notes.length} notes</span>
                    <span class="px-3 py-1 bg-white/10 rounded-full text-xs text-white">✅ ${state.tasks.filter(t => !t.completed).length} tasks</span>

                </div>
              </div>
              
              <div class="glass rounded-2xl p-6">
                <div id="clock" class="text-3xl font-bold text-white font-mono">${state.date.toLocaleTimeString()}</div>
                <div class="text-gray-400">${state.date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
                ${state.weather ? `
                  <div class="mt-4 flex items-center gap-3">
                    <img src="https://openweathermap.org/img/wn/${state.weather.icon}@2x.png" alt="weather" class="w-12 h-12" />
                    <div>
                      <div class="text-xl font-semibold text-white">${state.weather.temp}°C</div>
                      <div class="text-gray-400 text-sm">${state.weather.description}</div>
                    </div>
                  </div>
                ` : `
                  <div class="mt-4 flex items-center gap-3">
                    <div class="spinner w-8 h-8"></div>
                    <div class="text-gray-500">Loading weather...</div>
                  </div>
                `}
              </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
              ${[
                { icon: 'fa-comment-dots', label: 'Chats', value: state.chats.length, color: 'text-blue-400' },
                { icon: 'fa-list-check', label: 'Tasks', value: state.tasks.filter(t => !t.completed).length, color: 'text-green-400' },
                { icon: 'fa-note-sticky', label: 'Notes', value: state.notes.length, color: 'text-yellow-400' },
                { icon: 'fa-bell', label: 'Reminders', value: state.reminders.length, color: 'text-purple-400' }
              ].map(stat => `
                <div class="glass rounded-xl p-4 hover:bg-white/5 transition">
                  <i class="fa-solid ${stat.icon} ${stat.color} text-xl"></i>
                  <div class="text-2xl font-bold text-white mt-2">${stat.value}</div>
                  <div class="text-gray-400 text-sm">${stat.label}</div>
                </div>
              `).join('')}
            </div>
            
            <div class="mt-6">
              <h3 class="text-lg font-semibold text-white mb-3">Recent Chats</h3>
              <div class="space-y-2">
                ${state.chats.slice(0, 5).map(chat => `
                  <div class="glass rounded-lg p-3 flex justify-between items-center hover:bg-white/5 transition cursor-pointer">
                    <span class="text-white">${chat.title || 'New Chat'}</span>
                    <span class="text-gray-500 text-sm">${new Date(chat.updatedAt).toLocaleDateString()}</span>
                  </div>
                `).join('')}
                ${state.chats.length === 0 ? '<div class="text-gray-500 text-center py-8">No chats yet. Start a conversation!</div>' : ''}
              </div>
            </div>
          </div>
        `;
      }

      // ============ CHAT PAGE ============
      function renderChat() {
        return `
          <div id="chat-container" class="h-full flex flex-col">
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
              ${state.messages.length === 0 ? `
                <div class="h-full flex flex-col items-center justify-center text-center text-gray-500">
                  <div class="text-6xl mb-4 float-slow">🤖</div>
                  <h2 class="text-2xl font-bold text-white">Welcome to JARVIS</h2>
                  <p class="mt-2">How can I help you today?</p>
                  <div class="flex gap-2 mt-4 flex-wrap justify-center">
                    <button class="quick-prompt px-3 py-1.5 glass rounded-full text-sm text-gray-300 hover:text-white hover:bg-white/10 transition">Write a poem</button>
                    <button class="quick-prompt px-3 py-1.5 glass rounded-full text-sm text-gray-300 hover:text-white hover:bg-white/10 transition">Summarize this</button>
                    <button class="quick-prompt px-3 py-1.5 glass rounded-full text-sm text-gray-300 hover:text-white hover:bg-white/10 transition">Generate code</button>
                    <button class="quick-prompt px-3 py-1.5 glass rounded-full text-sm text-gray-300 hover:text-white hover:bg-white/10 transition">What's the weather?</button>
                  </div>
                </div>
              ` : state.messages.map((msg, i) => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} slide-in">
                  <div class="max-w-[85%] ${msg.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'} p-4 ${msg.role === 'user' ? '' : 'text-white'}">
                    ${msg.role === 'assistant' ? renderMarkdown(msg.content) : msg.content}
                    <div class="text-xs ${msg.role === 'user' ? 'text-blue-200' : 'text-gray-500'} mt-2">
                      ${new Date(msg.timestamp || Date.now()).toLocaleTimeString()}
                    </div>
                  </div>
                </div>
              `).join('')}
              ${state.isLoading ? `
                <div class="flex justify-start slide-in">
                  <div class="chat-bubble-ai p-4">
                    <div class="flex gap-2">
                      <span class="typing-dot w-2 h-2 bg-blue-400 rounded-full"></span>
                      <span class="typing-dot w-2 h-2 bg-blue-400 rounded-full"></span>
                      <span class="typing-dot w-2 h-2 bg-blue-400 rounded-full"></span>
                    </div>
                  </div>
                </div>
              ` : ''}
              <div id="chat-end"></div>
            </div>
            
            <div class="p-4 border-t border-white/5 bg-[#0a0a0f]">
              <div class="flex gap-2">
                <button id="voice-toggle" class="p-3 rounded-lg ${state.voiceEnabled ? 'bg-green-500/20 text-green-400' : 'bg-gray-700 text-gray-500'} transition hover:bg-opacity-30" title="Toggle voice output">
                  <i class="fa-solid ${state.voiceEnabled ? 'fa-microphone' : 'fa-microphone-slash'}"></i>
                </button>
                <button id="stop-btn" class="p-3 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition" title="Stop generation">
                  <i class="fa-solid fa-stop"></i>
                </button>
                <button id="clear-chat-btn" class="p-3 rounded-lg bg-gray-700/50 text-gray-400 hover:text-white hover:bg-gray-700 transition" title="Clear chat">
                  <i class="fa-regular fa-trash-can"></i>
                </button>
                <input id="chat-input" type="text" placeholder="Type your message..." class="flex-1 px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition input-focus" />
                <button id="voice-rec-btn" class="p-3 rounded-lg bg-purple-500/20 text-purple-400 hover:bg-purple-500/30 transition ${state.isRecording ? 'pulse-ring' : ''}" title="Voice input">
                  <i class="fa-solid fa-waveform"></i>
                </button>
                <button id="send-btn" class="p-3 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition disabled:opacity-50" title="Send message (Enter)">
                  <i class="fa-solid fa-paper-plane"></i>
                </button>
              </div>
              <div class="flex justify-between mt-2 text-xs text-gray-500">
                <span>Press <kbd class="px-1.5 py-0.5 bg-white/10 rounded">Enter</kbd> to send</span>
                <span><kbd class="px-1.5 py-0.5 bg-white/10 rounded">Ctrl+K</kbd> to focus</span>
              </div>
            </div>
          </div>
        `;
      }

      // ============ TOOLS PAGE ============
      function renderTools() {
        const tools = [
          { id: 'chat', icon: 'fa-comment', label: 'AI Chat', desc: 'Conversation' },
          { id: 'code', icon: 'fa-code', label: 'Code Generator', desc: 'Generate code' },
          { id: 'image', icon: 'fa-image', label: 'Image Generator', desc: 'Create images' },
          { id: 'summarize', icon: 'fa-file-lines', label: 'Summarizer', desc: 'Summarize text' },
          { id: 'translate', icon: 'fa-language', label: 'Translator', desc: 'Translate text' },
          { id: 'grammar', icon: 'fa-spell-check', label: 'Grammar Fixer', desc: 'Fix grammar' },
          { id: 'email', icon: 'fa-envelope', label: 'Email Writer', desc: 'Write emails' }
        ];
        
        const activeTool = tools.find(t => t.id === state.toolActive) || tools[0];
        
        return `
          <div id="tools-container" class="h-full flex">
            <div class="w-48 border-r border-white/5 p-2 space-y-1 overflow-y-auto custom-scrollbar">
              ${tools.map(t => `
                <div class="sidebar-item ${state.toolActive === t.id ? 'active' : ''} flex-col items-start px-3 py-2" data-tool="${t.id}">
                  <div class="flex items-center gap-2 w-full">
                    <i class="fa-solid ${t.icon} w-4 text-center"></i>
                    <span class="text-sm">${t.label}</span>
                  </div>
                  <span class="text-xs text-gray-500 ml-6">${t.desc}</span>
                </div>
              `).join('')}
            </div>
            
            <div class="flex-1 p-6 overflow-y-auto custom-scrollbar">
              <div class="flex items-center gap-3 mb-4">
                <i class="fa-solid ${activeTool.icon} text-blue-400 text-xl"></i>
                <h3 class="text-xl font-semibold text-white">${activeTool.label}</h3>
                <span class="text-xs text-gray-500 bg-white/5 px-2 py-0.5 rounded-full">AI Tool</span>
              </div>
              
              <textarea id="tool-input" class="w-full h-32 px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition input-focus resize-none" placeholder="Enter your prompt..."></textarea>
              
              <div class="flex gap-3 mt-4">
                <button id="tool-generate" class="px-6 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition disabled:opacity-50 flex items-center gap-2">
                  ${state.toolLoading ? '<i class="fa-solid fa-spinner fa-spin"></i> Processing...' : '<i class="fa-solid fa-wand-magic-sparkles"></i> Generate'}
                </button>
                <button id="tool-clear" class="px-4 py-2 rounded-lg bg-gray-700 text-gray-400 hover:text-white hover:bg-gray-600 transition">
                  <i class="fa-regular fa-trash-can"></i> Clear
                </button>
              </div>
              
              ${state.toolResult ? `
                <div class="mt-6 p-4 rounded-lg glass fade-in">
                  <div class="flex justify-between items-center mb-3">
                    <span class="text-sm text-gray-400">Result</span>
                    <button class="copy-btn px-3 py-1 rounded bg-white/10 text-white text-sm hover:bg-white/20 transition flex items-center gap-1">
                      <i class="fa-regular fa-copy"></i> Copy
                    </button>
                  </div>
                  <div class="text-white markdown max-h-96 overflow-y-auto custom-scrollbar">${renderMarkdown(state.toolResult)}</div>
                </div>
              ` : ''}
            </div>
          </div>
        `;

      // ============ NOTES PAGE ============
      function renderNotes() {
        return `
          <div id="notes-container" class="h-full overflow-y-auto p-6 custom-scrollbar">
            <div class="flex justify-between items-center mb-6">
              <div>
                <h2 class="text-2xl font-bold text-white">📝 Notes</h2>
                <p class="text-gray-400 text-sm">${state.notes.length} notes total</p>
              </div>
              <button id="add-note" class="px-4 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> New Note
              </button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              ${state.notes.map(note => `
                <div class="glass rounded-lg p-4 hover:bg-white/5 transition group">
                  <div class="flex justify-between items-start">
                    <h4 class="text-white font-semibold">${note.title}</h4>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                      <button class="text-gray-400 hover:text-blue-400 transition edit-note" data-id="${note._id}">
                        <i class="fa-regular fa-pen-to-square"></i>
                      </button>
                      <button class="text-gray-400 hover:text-red-400 transition delete-note" data-id="${note._id}">
                        <i class="fa-regular fa-trash-can"></i>
                      </button>
                    </div>
                  </div>
                  <p class="text-gray-400 text-sm mt-2 line-clamp-3">${note.content || 'No content'}</p>
                  <div class="flex justify-between items-center mt-3">
                    <div class="flex gap-1">
                      ${(note.tags || []).map(tag => `<span class="text-xs px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400">#${tag}</span>`).join('')}

                    <span class="text-gray-500 text-xs">${new Date(note.updatedAt || note.createdAt).toLocaleDateString()}</span>
                  </div>
                </div>
              `).join('')}
              ${state.notes.length === 0 ? `
                <div class="col-span-full text-center py-12 text-gray-500">
                  <div class="text-4xl mb-3">📝</div>
                  <p>No notes yet. Create your first note!</p>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }

      // ============ TASKS PAGE ============
      function renderTasks() {
        const pending = state.tasks.filter(t => !t.completed);
        const completed = state.tasks.filter(t => t.completed);
        
        return `
          <div id="tasks-container" class="h-full overflow-y-auto p-6 custom-scrollbar">
            <div class="flex justify-between items-center mb-6">
              <div>
                <h2 class="text-2xl font-bold text-white">✅ Tasks</h2>
                <p class="text-gray-400 text-sm">${pending.length} pending · ${completed.length} completed</p>
              </div>
              <button id="add-task" class="px-4 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> New Task
              </button>
            </div>
            
            <div class="space-y-2">
              <h4 class="text-sm text-gray-500 font-medium">Pending</h4>
              ${pending.map(task => `
                <div class="glass rounded-lg p-4 flex items-center gap-4 hover:bg-white/5 transition">
                  <button class="toggle-task text-2xl" data-id="${task._id}">
                    <i class="fa-regular fa-circle-check text-gray-500 hover:text-green-400 transition"></i>
                  </button>
                  <div class="flex-1">
                    <div class="text-white">${task.title}</div>
                    ${task.description ? `<div class="text-gray-400 text-sm">${task.description}</div>` : ''}
                    <div class="flex gap-3 mt-1">
                      ${task.dueDate ? `<span class="text-gray-500 text-xs">📅 ${new Date(task.dueDate).toLocaleDateString()}</span>` : ''}
                      ${task.priority ? `<span class="text-xs px-2 py-0.5 rounded-full ${task.priority === 'high' ? 'bg-red-500/20 text-red-400' : task.priority === 'medium' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-green-500/20 text-green-400'}">${task.priority}</span>` : ''}
                    </div>
                  </div>
                  <button class="text-gray-400 hover:text-red-400 transition delete-task" data-id="${task._id}">
                    <i class="fa-regular fa-trash-can"></i>
                  </button>
                </div>
              `).join('')}
              ${pending.length === 0 ? '<div class="text-gray-500 text-center py-4">No pending tasks 🎉</div>' : ''}
              
              ${completed.length > 0 ? `
                <h4 class="text-sm text-gray-500 font-medium mt-4">Completed</h4>
                ${completed.map(task => `
                  <div class="glass rounded-lg p-4 flex items-center gap-4 opacity-60 hover:opacity-100 transition">
                    <button class="toggle-task text-2xl" data-id="${task._id}">
                      <i class="fa-solid fa-circle-check text-green-400"></i>
                    </button>
                    <div class="flex-1">
                      <div class="text-white line-through">${task.title}</div>
                      ${task.description ? `<div class="text-gray-500 text-sm line-through">${task.description}</div>` : ''}
                    </div>
                    <button class="text-gray-400 hover:text-red-400 transition delete-task" data-id="${task._id}">
                      <i class="fa-regular fa-trash-can"></i>
                    </button>
                  </div>
                `).join('')}
              ` : ''}
            </div>
          </div>
        `;
      }

                  <div>
                    <div class="text-white font-medium">${state.user?.username}</div>

                </div>
              </div>
              
              <div class="glass rounded-lg p-4">
                <h3 class="text-white font-semibold mb-2">Theme</h3>
                <div class="flex gap-2">

                      <option value="alloy" ${state.user?.preferences?.voice === 'alloy' ? 'selected' : ''}>Alloy</option>
                      <option value="echo" ${state.user?.preferences?.voice === 'echo' ? 'selected' : ''}>Echo</option>
                      <option value="fable" ${state.user?.preferences?.voice === 'fable' ? 'selected' : ''}>Fable</option>

                  </div>
                </div>
              </div>
              
              <div class="glass rounded-lg p-4">

            <div class="mt-4 flex gap-2">

      // ============ TOAST ============
      function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        if (!container) return;
        
        const colors = {
          success: 'border-green-500 text-green-400 bg-green-500/10',
          error: 'border-red-500 text-red-400 bg-red-500/10',
          info: 'border-blue-500 text-blue-400 bg-blue-500/10',
          warning: 'border-yellow-500 text-yellow-400 bg-yellow-500/10'
        };
        
        const icons = {
          success: 'fa-circle-check',
          error: 'fa-circle-xmark',
          info: 'fa-circle-info',
          warning: 'fa-triangle-exclamation'
        };
        
        const toast = document.createElement('div');
        toast.className = `glass px-4 py-3 rounded-lg border-l-4 ${colors[type] || colors.info} toast pointer-events-auto flex items-center gap-3`;
        toast.innerHTML = `
          <i class="fa-solid ${icons[type] || icons.info}"></i>
          <span>${message}</span>
        `;
        container.appendChild(toast);
        
        setTimeout(() => {
          toast.classList.add('toast-exit');
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // ============ MARKDOWN RENDERER ============
      function renderMarkdown(text) {
        if (!text) return '';
        
        let html = text;
        
        html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
          return `<pre><code class="language-${lang || 'text'}">${escapeHtml(code.trim())}</code></pre>`;
        });
        
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/^[\s]*[-*] (.*$)/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-blue-400 hover:underline">$1</a>');
        html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/\n/g, '<br />');
        
        return html;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // ============ CHAT FUNCTIONS ============
      async function sendChatMessage(text) {
        if (!text.trim() || state.isLoading) return;

        const userMessage = { role: 'user', content: text, timestamp: Date.now() };
        state.messages.push(userMessage);
        state.isLoading = true;
        render();
        
        try {
          const data = await API.post('/chat', {
            messages: state.messages.map(m => ({ role: m.role, content: m.content })),
            model: 'gpt-3.5-turbo'
          });
          
          state.messages.push({ role: 'assistant', content: data.content, timestamp: Date.now() });
          
          if (state.voiceEnabled) {
            speakText(data.content);
          }
          
          await loadChats();
        } catch (error) {
          state.messages.push({ role: 'assistant', content: `Error: ${error.message}`, timestamp: Date.now() });
          showToast('Failed to get response', 'error');
        }
        
        state.isLoading = false;
        render();
        
        const end = document.getElementById('chat-end');
        if (end) end.scrollIntoView({ behavior: 'smooth' });
      }

      function speakText(text) {
        if (!state.speechSynthesis) return;
        
        if (state.currentUtterance) {
          state.speechSynthesis.cancel(state.currentUtterance);
        }
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        utterance.voice = state.speechSynthesis.getVoices().find(v => v.lang.includes('en')) || null;
        
        state.currentUtterance = utterance;
        state.speechSynthesis.speak(utterance);
      }

      function startVoiceRecognition() {
        if (!('webkitSpeechRecognition' in window)) {
          showToast('Voice recognition not supported', 'error');
          return;
        }
        
        state.isRecording = true;
        render();
        
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = true;
        
        recognition.onresult = (event) => {
          let final = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
              final += event.results[i][0].transcript;
            }
          }
          if (final) {
            const input = document.getElementById('chat-input');
            if (input) {
              input.value = final;
              sendChatMessage(final);
            }
          }
        };
        
        recognition.onend = () => {
          state.isRecording = false;
          render();
        };
        
        recognition.onerror = () => {
          state.isRecording = false;
          render();
          showToast('Voice recognition error', 'error');
        };
        
        recognition.start();
      }

      // ============ DATA LOADERS ============
      async function loadChats() {
        try {
          state.chats = await API.get('/chat/history');
        } catch (error) {
          state.chats = [];
        }
      }

      async function loadNotes() {
        try {
          state.notes = await API.get('/notes');
        } catch (error) {
          state.notes = [];
        }
      }

      async function loadTasks() {
        try {
          state.tasks = await API.get('/tasks');
        } catch (error) {
          state.tasks = [];

      }

      async function loadDashboard() {

          state.weather = weather;

          render();

        }

      async function loadAdmin() {
        try {
          const [users, stats] = await Promise.all([
            API.get('/admin/users'),

          state.adminUsers = users;

      // ============ CLOCK UPDATER ============
      function updateClock() {
        state.date = new Date();
        const clock = document.getElementById('clock');
        if (clock) {
          clock.textContent = state.date.toLocaleTimeString();
        }
      }

      // ============ EVENT BINDINGS ============
      function bindAppEvents() {
        // Sidebar navigation
        document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
          el.addEventListener('click', () => {
            state.currentPage = el.dataset.page;
            render();
          });
        });
        
        // Tool navigation
        document.querySelectorAll('[data-tool]').forEach(el => {
          el.addEventListener('click', () => {
            state.toolActive = el.dataset.tool;
            state.toolResult = '';
            render();
          });
        });
        
        // Sidebar toggle
        const sidebarToggle = document.getElementById('sidebar-toggle');
        if (sidebarToggle) {
          sidebarToggle.addEventListener('click', () => {
            const sidebar = document.querySelector('.sidebar');
            if (sidebar) {
              sidebar.classList.toggle('w-20');
              sidebar.classList.toggle('w-64');
            }
          });
        }
        
        // Logout
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to logout?')) {
              localStorage.removeItem('jarvis_token');
              state.token = null;
              render();
              showToast('Logged out successfully', 'info');
            }
          });
        }
        
        // Chat
        const sendBtn = document.getElementById('send-btn');
        const chatInput = document.getElementById('chat-input');
        const stopBtn = document.getElementById('stop-btn');
        const clearChatBtn = document.getElementById('clear-chat-btn');
        
        if (sendBtn && chatInput) {
          const sendMessage = () => {
            const text = chatInput.value.trim();
            if (text && !state.isLoading) {
              chatInput.value = '';
              state.input = '';
              sendChatMessage(text);
            }
          };
          
          sendBtn.addEventListener('click', sendMessage);
          chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              sendMessage();
            }
          });
          chatInput.addEventListener('input', (e) => {
            state.input = e.target.value;
          });
        }
        
        if (stopBtn) {
          stopBtn.addEventListener('click', () => {
            state.isLoading = false;
            if (state.currentUtterance) {
              state.speechSynthesis.cancel(state.currentUtterance);
            }
            render();
            showToast('Generation stopped', 'warning');
          });
        }
        
        if (clearChatBtn) {
          clearChatBtn.addEventListener('click', () => {
            if (state.messages.length === 0) return;
            if (confirm('Clear all messages?')) {
              state.messages = [];
              render();
              showToast('Chat cleared', 'info');
            }
          });
        }
        
        // Quick prompts
        document.querySelectorAll('.quick-prompt').forEach(el => {
          el.addEventListener('click', () => {
            const text = el.textContent.trim();
            const input = document.getElementById('chat-input');
            if (input) {
              input.value = text;
              sendChatMessage(text);
            }
          });
        });
        
        // Voice toggle
        const voiceToggle = document.getElementById('voice-toggle');
        if (voiceToggle) {
          voiceToggle.addEventListener('click', () => {
            state.voiceEnabled = !state.voiceEnabled;
            if (!state.voiceEnabled && state.currentUtterance) {
              state.speechSynthesis.cancel(state.currentUtterance);
            }
            render();
            showToast(state.voiceEnabled ? 'Voice output enabled' : 'Voice output disabled', 'info');
          });
        }
        
        // Voice recognition
        const voiceRecBtn = document.getElementById('voice-rec-btn');
        if (voiceRecBtn) {
          voiceRecBtn.addEventListener('click', startVoiceRecognition);
        }
        
        // Tools
        const toolGenerate = document.getElementById('tool-generate');
        if (toolGenerate) {
          toolGenerate.addEventListener('click', async () => {
            const input = document.getElementById('tool-input');
            if (!input) return;
            
            state.toolLoading = true;
            state.toolResult = '';
            render();
            
            try {
              const endpoints = {
                'code': '/tools/generate-code',
                'image': '/tools/generate-image',
                'summarize': '/tools/summarize',
                'translate': '/tools/translate',
                'grammar': '/tools/fix-grammar',
                'email': '/tools/email-writer'
              };
              
              const endpoint = endpoints[state.toolActive];
              if (!endpoint) {
                state.toolResult = 'This tool is not available yet.';
                state.toolLoading = false;
                render();
                return;
              }
              
              const data = await API.post(endpoint, { 
                prompt: input.value,
                targetLang: 'Spanish',
                language: 'javascript',
                text: input.value
              });
              
              state.toolResult = data.code || data.url || data.summary || data.translated || data.fixed || data.email || 'Done!';
            } catch (error) {
              state.toolResult = `Error: ${error.message}`;
            }
            
            state.toolLoading = false;
            render();
          });
        }
        
        // Tool clear
        const toolClear = document.getElementById('tool-clear');
        if (toolClear) {
          toolClear.addEventListener('click', () => {
            const input = document.getElementById('tool-input');
            if (input) input.value = '';
            state.toolResult = '';
            render();
          });
        }
        
        // Copy button
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const text = btn.closest('.p-4')?.querySelector('.markdown')?.textContent || '';
            if (navigator.clipboard) {
              navigator.clipboard.writeText(text);
              showToast('Copied to clipboard!', 'success');
            }
          });
        });
        
        // Notes
        const addNote = document.getElementById('add-note');
        if (addNote) {
          addNote.addEventListener('click', async () => {
            const title = prompt('Note title:');
            if (title) {
              const content = prompt('Note content:');
              try {
                await API.post('/notes', { title, content });
                await loadNotes();
                render();
                showToast('Note created!', 'success');
              } catch (error) {
                showToast('Failed to create note', 'error');
              }
            }
          });
        }
        
        document.querySelectorAll('.delete-note').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this note?')) {
              await API.delete(`/notes/${btn.dataset.id}`);
              await loadNotes();
              render();
            }
          });
        });
        
        // Tasks
        const addTask = document.getElementById('add-task');
        if (addTask) {
          addTask.addEventListener('click', async () => {
            const title = prompt('Task title:');
            if (title) {
              try {
                await API.post('/tasks', { title, completed: false });
                await loadTasks();
                render();
                showToast('Task added!', 'success');
              } catch (error) {
                showToast('Failed to add task', 'error');
              }
            }
          });
        }
        
        document.querySelectorAll('.toggle-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            const task = state.tasks.find(t => t._id === btn.dataset.id);
            if (task) {
              await API.put(`/tasks/${task._id}`, { ...task, completed: !task.completed });
              await loadTasks();
              render();
            }
          });
        });
        
        document.querySelectorAll('.delete-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this task?')) {
              await API.delete(`/tasks/${btn.dataset.id}`);
              await loadTasks();
              render();
            }
          });
        });
        
        // Settings
        const saveSettings = document.getElementById('save-settings');
        if (saveSettings) {
          saveSettings.addEventListener('click', async () => {
            const voice = document.getElementById('voice-select')?.value || 'alloy';
            const wakeWord = document.getElementById('wake-word')?.value || 'Jarvis';
            const language = document.getElementById('language-select')?.value || 'en';
            try {
              await API.put('/user/profile', {
                preferences: { ...state.user?.preferences, voice, wakeWord, language }
              });
              showToast('Settings saved!', 'success');
            } catch (error) {
              showToast('Failed to save settings', 'error');
            }
          });
        }
        
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.theme-btn').forEach(b => {
              b.className = 'theme-btn px-4 py-2 rounded-lg bg-gray-700 text-gray-400 border border-transparent';
            });
            btn.className = 'theme-btn px-4 py-2 rounded-lg bg-blue-500/20 text-blue-400 border border-blue-500/30';
            state.theme = btn.dataset.theme;
            // Apply theme logic here (background colors, etc.)
            showToast(`Theme changed to ${state.theme}`, 'info');
          });
        });
        
        // Admin refresh
        const adminRefresh = document.getElementById('admin-refresh');
        if (adminRefresh) {
          adminRefresh.addEventListener('click', loadAdmin);
        }
        
        // Notifications
        const notificationsBtn = document.getElementById('notifications-btn');
        if (notificationsBtn) {
          notificationsBtn.addEventListener('click', () => {
            state.unreadNotifications = 0;
            render();
            showToast('No new notifications', 'info');
          });
        }
        
        // User menu
        const userMenuBtn = document.getElementById('user-menu-btn');
        if (userMenuBtn) {
          userMenuBtn.addEventListener('click', () => {
            state.currentPage = 'settings';
            render();
          });
        }
      }

      // ============ INIT ============
      // Check for existing session
      if (state.token) {
        API.get('/user/profile')
          .then(user => {
            state.user = user;
            render();
            setInterval(updateClock, 1000);
            loadChats();
            loadDashboard();
          })
          .catch(() => {
            state.token = null;
            localStorage.removeItem('jarvis_token');
            render();
          });
      } else {
        render();
      }

      // Make API and state available globally for debugging
      window.__JARVIS = { API, state, render, sendChatMessage, showToast };

      console.log('🤖 J.A.R.V.I.S. AI Assistant v2.0');
      console.log('📡 Backend: http://localhost:5000');
      console.log('🔌 WebSocket: ws://localhost:5000');
      console.log('💡 Press Ctrl+K to focus chat');
      console.log('📊 Type window.__JARVIS for debugging');

    })();
  </script>
