<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S. - AI Assistant</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
    }

    /* Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .chat-bubble-user {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border-radius: 20px 20px 4px 20px;
    }

    .chat-bubble-ai {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px 20px 20px 4px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 2px;
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 0.3; }
      100% { transform: scale(0.95); opacity: 0.7; }
    }
    .pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }

    @keyframes typing-dot {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .typing-dot { animation: typing-dot 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes slide-in {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .slide-in { animation: slide-in 0.3s ease-out; }

    .sidebar-item {
      transition: all 0.3s ease;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: #9ca3af;
    }

    .sidebar-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: white;
    }

    .sidebar-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: #3b82f6;
      border-radius: 0 3px 3px 0;
    }

    .sidebar-item {
      position: relative;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      transition: all 0.3s ease;
      transform: translateX(0);
      pointer-events: auto;
    }
    .toast-exit {
      opacity: 0;
      transform: translateX(100px);
    }

    @media (max-width: 768px) {
      .sidebar { width: 64px; }
      .sidebar-label { display: none !important; }
    }

    .markdown pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5rem 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .markdown code { color: #f472b6; font-size: 0.9em; }
    .markdown h1, .markdown h2, .markdown h3 { font-weight: 600; margin: 0.75rem 0 0.5rem 0; }
    .markdown ul, .markdown ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .markdown li { margin: 0.25rem 0; }
    .markdown blockquote { border-left: 3px solid #3b82f6; padding-left: 1rem; color: #9ca3af; margin: 0.5rem 0; }
  </style>
</head>
<body>

  <div id="root">
    <!-- App renders here -->
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <script>
    // ========================================================================
    // CONFIGURATION
    // ========================================================================
    const CONFIG = {
      // UPDATE THIS WITH YOUR RENDER BACKEND URL
      BACKEND_URL: 'https://my-javis.onrender.com',
      // For local development: 'http://localhost:10000'
    };

    // ========================================================================
    // MAIN APPLICATION
    // ========================================================================
    (function() {
      'use strict';

      // ============ STATE ============
      const state = {
        user: null,
        token: localStorage.getItem('jarvis_token'),
        currentPage: 'chat',
        messages: [],
        isLoading: false,
        isRecording: false,
        voiceEnabled: true,
        chats: [],
        notes: [],
        tasks: [],
        files: [],
        weather: null,
        date: new Date(),
        input: '',
        adminUsers: [],
        adminStats: {},
        toolResult: '',
        toolLoading: false,
        toolActive: 'chat'
      };

      // ============ API ============
      const API = {
        base: CONFIG.BACKEND_URL + '/api',

        async request(endpoint, options = {}) {
          const headers = {
            'Content-Type': 'application/json',
            ...options.headers
          };

          if (state.token) {
            headers['Authorization'] = `Bearer ${state.token}`;
          }

          try {
            const response = await fetch(`${this.base}${endpoint}`, {
              ...options,
              headers
            });

            if (response.status === 401) {
              localStorage.removeItem('jarvis_token');
              state.token = null;
              render();
              showToast('Session expired. Please login again.', 'error');
              throw new Error('Unauthorized');
            }

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
          } catch (error) {
            if (error.message === 'Unauthorized') throw error;
            throw new Error(error.message || 'Network error');
          }
        },

        async get(endpoint) {
          return this.request(endpoint, { method: 'GET' });
        },

        async post(endpoint, body) {
          return this.request(endpoint, {
            method: 'POST',
            body: JSON.stringify(body)
          });
        },

        async put(endpoint, body) {
          return this.request(endpoint, {
            method: 'PUT',
            body: JSON.stringify(body)
          });
        },

        async delete(endpoint) {
          return this.request(endpoint, { method: 'DELETE' });
        }
      };

      // ============ RENDER ============
      function render() {
        const root = document.getElementById('root');

        if (!state.token) {
          root.innerHTML = renderAuth();
          bindAuthEvents();
          return;
        }

        root.innerHTML = renderApp();
        bindAppEvents();
        loadData();

        const chatInput = document.getElementById('chat-input');
        if (chatInput && state.input) {
          chatInput.value = state.input;
        }
      }

      // ============ AUTH PAGE ============
      function renderAuth() {
        return `
          <div class="min-h-screen flex items-center justify-center p-4" style="
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
          ">
            <div class="glass rounded-2xl p-8 w-full max-w-md">
              <div class="text-center mb-8">
                <div class="text-6xl mb-3 float">🤖</div>
                <h1 class="text-4xl font-bold gradient-text">J.A.R.V.I.S.</h1>
                <p class="text-gray-400 mt-2">Your AI Assistant</p>
              </div>

              <form id="auth-form" class="space-y-4">
                <div id="auth-fields" style="display: none;">
                  <input type="text" id="auth-username" placeholder="Username"
                    class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                </div>
                <input type="email" id="auth-email" placeholder="Email"
                  class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                <input type="password" id="auth-password" placeholder="Password"
                  class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                <button type="submit" id="auth-submit"
                  class="w-full py-3 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:opacity-90 transition flex items-center justify-center gap-2">
                  <i class="fa-solid fa-right-to-bracket"></i>
                  <span>Sign In</span>
                </button>
              </form>

              <p class="text-center mt-4 text-gray-400">
                <span id="auth-toggle-text">Don't have an account?</span>
                <button id="auth-toggle" class="text-blue-400 hover:underline ml-2">Sign Up</button>
              </p>

              <div class="mt-4 text-center text-xs text-gray-500">
                Backend: ${CONFIG.BACKEND_URL}
              </div>
            </div>
          </div>
        `;
      }

      function bindAuthEvents() {
        let isLogin = true;

        document.getElementById('auth-toggle')?.addEventListener('click', () => {
          isLogin = !isLogin;
          document.getElementById('auth-fields').style.display = isLogin ? 'none' : 'block';
          document.getElementById('auth-submit').innerHTML = isLogin ?
            '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>' :
            '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
          document.getElementById('auth-toggle-text').textContent = isLogin ? "Don't have an account?" :
            'Already have an account?';
          document.getElementById('auth-toggle').textContent = isLogin ? 'Sign Up' : 'Sign In';
        });

        document.getElementById('auth-form')?.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('auth-email').value;
          const password = document.getElementById('auth-password').value;
          const username = document.getElementById('auth-username').value;

          const btn = document.getElementById('auth-submit');
          btn.disabled = true;
          btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>Loading...</span>';

          try {
            const endpoint = isLogin ? '/auth/login' : '/auth/register';
            const body = isLogin ? { email, password } : { username, email, password };
            const data = await API.post(endpoint, body);
            state.token = data.token;
            state.user = data.user;
            localStorage.setItem('jarvis_token', data.token);
            render();
            showToast(isLogin ? 'Welcome back! 👋' : 'Account created! 🎉', 'success');
          } catch (error) {
            showToast(error.message || 'Authentication failed', 'error');
            btn.disabled = false;
            btn.innerHTML = isLogin ?
              '<i class="fa-solid fa-right-to-bracket"></i><span>Sign In</span>' :
              '<i class="fa-solid fa-user-plus"></i><span>Create Account</span>';
          }
        });
      }

      // ============ MAIN APP ============
      function renderApp() {
        return `
          <div class="flex h-screen bg-[#0a0a0f]">
            ${renderSidebar()}
            <div class="flex-1 overflow-hidden">
              <div class="glass px-6 py-3 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                  <h2 class="text-lg font-semibold text-white capitalize">${state.currentPage}</h2>
                  <span class="text-xs text-gray-500 bg-white/5 px-2 py-0.5 rounded-full">v2.0</span>
                </div>
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">
                    ${state.user?.username?.charAt(0).toUpperCase() || 'U'}
                  </div>
                </div>
              </div>
              <div class="h-[calc(100%-60px)] overflow-hidden">
                ${state.currentPage === 'dashboard' ? renderDashboard() : ''}
                ${state.currentPage === 'chat' ? renderChat() : ''}
                ${state.currentPage === 'tools' ? renderTools() : ''}
                ${state.currentPage === 'notes' ? renderNotes() : ''}
                ${state.currentPage === 'tasks' ? renderTasks() : ''}
                ${state.currentPage === 'settings' ? renderSettings() : ''}
                ${state.currentPage === 'admin' ? renderAdmin() : ''}
              </div>
            </div>
          </div>
        `;
      }

      // ============ SIDEBAR ============
      function renderSidebar() {
        const pages = [
          { id: 'dashboard', icon: 'fa-gauge-high', label: 'Dashboard' },
          { id: 'chat', icon: 'fa-comment-dots', label: 'Chat' },
          { id: 'tools', icon: 'fa-wand-magic-sparkles', label: 'Tools' },
          { id: 'notes', icon: 'fa-note-sticky', label: 'Notes' },
          { id: 'tasks', icon: 'fa-list-check', label: 'Tasks' },
          { id: 'settings', icon: 'fa-gear', label: 'Settings' }
        ];

        if (state.user?.isAdmin) {
          pages.push({ id: 'admin', icon: 'fa-users-gear', label: 'Admin' });
        }

        return `
          <div class="sidebar glass-dark w-20 md:w-64 flex flex-col border-r border-white/5">
            <div class="p-4 text-center border-b border-white/5">
              <div class="text-2xl md:text-3xl font-bold gradient-text">JARVIS</div>
              <div class="text-xs text-gray-500 hidden md:block">v2.0</div>
            </div>

            <nav class="flex-1 p-2 space-y-1 overflow-y-auto">
              ${pages.map(p => `
                <div class="sidebar-item ${state.currentPage === p.id ? 'active' : ''}" data-page="${p.id}">
                  <i class="fa-solid ${p.icon} w-5 text-center"></i>
                  <span class="sidebar-label hidden md:inline">${p.label}</span>
                </div>
              `).join('')}
            </nav>

            <div class="p-4 border-t border-white/5">
              <button id="logout-btn" class="w-full flex items-center gap-3 px-2 py-2 rounded-lg text-red-400 hover:bg-red-500/10 transition">
                <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
                <span class="hidden md:inline">Logout</span>
              </button>
            </div>
          </div>
        `;
      }

      // ============ DASHBOARD ============
      function renderDashboard() {
        const hour = new Date().getHours();
        const greeting = hour < 12 ? 'Morning' : hour < 18 ? 'Afternoon' : 'Evening';

        return `
          <div class="h-full overflow-y-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div class="md:col-span-2 rounded-2xl p-8 relative overflow-hidden" style="
                background: linear-gradient(135deg, #1a1a2e, #3b82f6);
              ">
                <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
                <div class="relative z-10">
                  <h1 class="text-3xl font-bold text-white">Good ${greeting}, ${state.user?.username || 'User'}! 👋</h1>
                  <p class="text-blue-200 mt-2">How can JARVIS assist you today?</p>
                </div>
              </div>

              <div class="glass rounded-2xl p-6">
                <div id="clock" class="text-3xl font-bold text-white font-mono">${state.date.toLocaleTimeString()}</div>
                <div class="text-gray-400">${state.date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
                ${state.weather ? `
                  <div class="mt-4 flex items-center gap-3">
                    <img src="https://openweathermap.org/img/wn/${state.weather.icon}@2x.png" alt="weather" class="w-12 h-12" />
                    <div>
                      <div class="text-xl font-semibold text-white">${state.weather.temp}°C</div>
                      <div class="text-gray-400 text-sm">${state.weather.description}</div>
                    </div>
                  </div>
                ` : `
                  <div class="mt-4 text-gray-500">Loading weather...</div>
                `}
              </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
              ${[
                { icon: 'fa-comment-dots', label: 'Chats', value: state.chats.length, color: 'text-blue-400' },
                { icon: 'fa-list-check', label: 'Tasks', value: state.tasks.filter(t => !t.completed).length, color: 'text-green-400' },
                { icon: 'fa-note-sticky', label: 'Notes', value: state.notes.length, color: 'text-yellow-400' }
              ].map(stat => `
                <div class="glass rounded-xl p-4">
                  <i class="fa-solid ${stat.icon} ${stat.color} text-xl"></i>
                  <div class="text-2xl font-bold text-white mt-2">${stat.value}</div>
                  <div class="text-gray-400 text-sm">${stat.label}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      // ============ CHAT ============
      function renderChat() {
        return `
          <div class="h-full flex flex-col">
            <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-messages">
              ${state.messages.length === 0 ? `
                <div class="h-full flex flex-col items-center justify-center text-center text-gray-500">
                  <div class="text-6xl mb-4 float">🤖</div>
                  <h2 class="text-2xl font-bold text-white">J.A.R.V.I.S. is ready</h2>
                  <p class="mt-2">How can I help you today?</p>
                </div>
              ` : state.messages.map((msg, i) => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} slide-in">
                  <div class="max-w-[85%] ${msg.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'} p-4">
                    ${msg.role === 'assistant' ? renderMarkdown(msg.content) : msg.content}
                    <div class="text-xs ${msg.role === 'user' ? 'text-blue-200' : 'text-gray-500'} mt-2">
                      ${new Date(msg.timestamp || Date.now()).toLocaleTimeString()}
                    </div>
                  </div>
                </div>
              `).join('')}
              ${state.isLoading ? `
                <div class="flex justify-start slide-in">
                  <div class="chat-bubble-ai p-4">
                    <div class="flex gap-2">
                      <span class="typing-dot w-2 h-2 bg-blue-400 rounded-full"></span>
                      <span class="typing-dot w-2 h-2 bg-blue-400 rounded-full"></span>
                      <span class="typing-dot w-2 h-2 bg-blue-400 rounded-full"></span>
                    </div>
                  </div>
                </div>
              ` : ''}
              <div id="chat-end"></div>
            </div>

            <div class="p-4 border-t border-white/5 bg-[#0a0a0f]">
              <div class="flex gap-2">
                <button id="voice-toggle" class="p-3 rounded-lg ${state.voiceEnabled ? 'bg-green-500/20 text-green-400' : 'bg-gray-700 text-gray-500'} transition">
                  <i class="fa-solid ${state.voiceEnabled ? 'fa-microphone' : 'fa-microphone-slash'}"></i>
                </button>
                <button id="stop-btn" class="p-3 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition">
                  <i class="fa-solid fa-stop"></i>
                </button>
                <input id="chat-input" type="text" placeholder="Type your message..."
                  class="flex-1 px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none transition" />
                <button id="send-btn" class="p-3 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition disabled:opacity-50">
                  <i class="fa-solid fa-paper-plane"></i>
                </button>
              </div>
              <div class="flex justify-between mt-2 text-xs text-gray-500">
                <span>Press <kbd class="px-1.5 py-0.5 bg-white/10 rounded">Enter</kbd> to send</span>
                <span><kbd class="px-1.5 py-0.5 bg-white/10 rounded">Ctrl+K</kbd> to focus</span>
              </div>
            </div>
          </div>
        `;
      }

      // ============ TOOLS ============
      function renderTools() {
        const tools = [
          { id: 'chat', icon: 'fa-comment', label: 'AI Chat' },
          { id: 'code', icon: 'fa-code', label: 'Code Generator' },
          { id: 'image', icon: 'fa-image', label: 'Image Generator' },
          { id: 'summarize', icon: 'fa-file-lines', label: 'Summarizer' },
          { id: 'translate', icon: 'fa-language', label: 'Translator' },
          { id: 'grammar', icon: 'fa-spell-check', label: 'Grammar Fixer' }
        ];

        const active = tools.find(t => t.id === state.toolActive) || tools[0];

        return `
          <div class="h-full flex">
            <div class="w-48 border-r border-white/5 p-2 space-y-1 overflow-y-auto">
              ${tools.map(t => `
                <div class="sidebar-item ${state.toolActive === t.id ? 'active' : ''}" data-tool="${t.id}">
                  <i class="fa-solid ${t.icon} w-4 text-center"></i>
                  <span class="text-sm">${t.label}</span>
                </div>
              `).join('')}
            </div>

            <div class="flex-1 p-6 overflow-y-auto">
              <h3 class="text-xl font-semibold text-white mb-4">${active.label}</h3>

              <textarea id="tool-input" class="w-full h-32 px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-blue-500 focus:outline-none resize-none"
                placeholder="Enter your prompt..."></textarea>

              <button id="tool-generate" class="mt-4 px-6 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition disabled:opacity-50">
                ${state.toolLoading ? 'Processing...' : 'Generate'}
              </button>

              ${state.toolResult ? `
                <div class="mt-6 p-4 rounded-lg glass">
                  <div class="text-white markdown">${renderMarkdown(state.toolResult)}</div>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }

      // ============ NOTES ============
      function renderNotes() {
        return `
          <div class="h-full overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-2xl font-bold text-white">📝 Notes</h2>
              <button id="add-note" class="px-4 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> New Note
              </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              ${state.notes.map(note => `
                <div class="glass rounded-lg p-4">
                  <h4 class="text-white font-semibold">${note.title}</h4>
                  <p class="text-gray-400 text-sm mt-2">${note.content || 'No content'}</p>
                  <button class="text-gray-400 hover:text-red-400 transition text-sm mt-2 delete-note" data-id="${note._id}">
                    <i class="fa-regular fa-trash-can"></i> Delete
                  </button>
                </div>
              `).join('')}
              ${state.notes.length === 0 ? '<div class="col-span-full text-center py-12 text-gray-500">No notes yet</div>' : ''}
            </div>
          </div>
        `;
      }

      // ============ TASKS ============
      function renderTasks() {
        const pending = state.tasks.filter(t => !t.completed);

        return `
          <div class="h-full overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-2xl font-bold text-white">✅ Tasks</h2>
              <button id="add-task" class="px-4 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> New Task
              </button>
            </div>
            <div class="space-y-2">
              ${pending.map(task => `
                <div class="glass rounded-lg p-4 flex items-center gap-4">
                  <button class="toggle-task text-2xl" data-id="${task._id}">
                    <i class="fa-regular fa-circle-check text-gray-500 hover:text-green-400 transition"></i>
                  </button>
                  <div class="flex-1">
                    <div class="text-white">${task.title}</div>
                    ${task.description ? `<div class="text-gray-400 text-sm">${task.description}</div>` : ''}
                  </div>
                  <button class="text-gray-400 hover:text-red-400 transition delete-task" data-id="${task._id}">
                    <i class="fa-regular fa-trash-can"></i>
                  </button>
                </div>
              `).join('')}
              ${pending.length === 0 ? '<div class="text-gray-500 text-center py-4">No pending tasks 🎉</div>' : ''}
            </div>
          </div>
        `;
      }

      // ============ SETTINGS ============
      function renderSettings() {
        return `
          <div class="h-full overflow-y-auto p-6">
            <h2 class="text-2xl font-bold text-white mb-6">⚙️ Settings</h2>
            <div class="max-w-2xl space-y-6">
              <div class="glass rounded-lg p-4">
                <h3 class="text-white font-semibold mb-3">Profile</h3>
                <div class="flex items-center gap-4">
                  <div class="w-16 h-16 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center text-white text-2xl font-bold">
                    ${state.user?.username?.charAt(0).toUpperCase() || 'U'}
                  </div>
                  <div>
                    <div class="text-white font-medium">${state.user?.username}</div>
                    <div class="text-gray-400 text-sm">${state.user?.email}</div>
                  </div>
                </div>
              </div>

              <div class="glass rounded-lg p-4">
                <h3 class="text-white font-semibold mb-2">Backend</h3>
                <div class="text-sm text-gray-400">${CONFIG.BACKEND_URL}</div>
                <button id="test-connection" class="mt-2 px-4 py-1 rounded bg-blue-500/20 text-blue-400 text-sm hover:bg-blue-500/30 transition">
                  <i class="fa-solid fa-plug"></i> Test Connection
                </button>
              </div>
            </div>
          </div>
        `;
      }

      // ============ ADMIN ============
      function renderAdmin() {
        return `
          <div class="h-full overflow-y-auto p-6">
            <h2 class="text-2xl font-bold text-white mb-6">🛡️ Admin Dashboard</h2>
            <div class="grid grid-cols-4 gap-4 mb-6">
              ${[
                { label: 'Users', value: state.adminStats.totalUsers || 0, color: 'text-blue-400' },
                { label: 'Chats', value: state.adminStats.totalChats || 0, color: 'text-green-400' },
                { label: 'Notes', value: state.adminStats.totalNotes || 0, color: 'text-yellow-400' },
                { label: 'Tasks', value: state.adminStats.totalTasks || 0, color: 'text-purple-400' }
              ].map(stat => `
                <div class="glass rounded-lg p-4 text-center">
                  <div class="text-2xl font-bold text-white">${stat.value}</div>
                  <div class="text-gray-400 text-sm">${stat.label}</div>
                </div>
              `).join('')}
            </div>
            <div class="glass rounded-lg overflow-hidden">
              <table class="w-full">
                <thead class="bg-white/5">
                  <tr>
                    <th class="px-4 py-3 text-left text-gray-400 text-sm">User</th>
                    <th class="px-4 py-3 text-left text-gray-400 text-sm">Email</th>
                    <th class="px-4 py-3 text-left text-gray-400 text-sm">Chats</th>
                  </tr>
                </thead>
                <tbody>
                  ${state.adminUsers.map(user => `
                    <tr class="border-t border-white/5">
                      <td class="px-4 py-3 text-white">${user.username}</td>
                      <td class="px-4 py-3 text-gray-400 text-sm">${user.email}</td>
                      <td class="px-4 py-3 text-gray-400">${user.usage?.chats || 0}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      // ============ HELPERS ============

      function renderMarkdown(text) {
        if (!text) return '';
        let html = text;
        html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/^[\s]*[-*] (.*$)/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-blue-400 hover:underline">$1</a>');
        html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/\n/g, '<br />');
        return html;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const colors = {
          success: 'border-green-500 text-green-400 bg-green-500/10',
          error: 'border-red-500 text-red-400 bg-red-500/10',
          info: 'border-blue-500 text-blue-400 bg-blue-500/10'
        };

        const icons = {
          success: 'fa-circle-check',
          error: 'fa-circle-xmark',
          info: 'fa-circle-info'
        };

        const toast = document.createElement('div');
        toast.className = `glass px-4 py-3 rounded-lg border-l-4 ${colors[type] || colors.info} toast pointer-events-auto flex items-center gap-3`;
        toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span>${message}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.add('toast-exit');
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // ============ CHAT FUNCTIONS ============

      async function sendChatMessage(text) {
        if (!text.trim() || state.isLoading) return;

        const userMessage = { role: 'user', content: text, timestamp: Date.now() };
        state.messages.push(userMessage);
        state.isLoading = true;
        render();

        try {
          const response = await API.post('/chat', {
            messages: state.messages.map(m => ({ role: m.role, content: m.content })),
            model: 'gpt-3.5-turbo'
          });

          state.messages.push({ role: 'assistant', content: response.content, timestamp: Date.now() });

          if (state.voiceEnabled) {
            speakText(response.content);
          }

          await loadChats();
        } catch (error) {
          state.messages.push({ role: 'assistant', content: `⚠️ Error: ${error.message}`, timestamp: Date.now() });
          showToast('Failed to get response', 'error');
        }

        state.isLoading = false;
        render();
        const end = document.getElementById('chat-end');
        if (end) end.scrollIntoView({ behavior: 'smooth' });
      }

      function speakText(text) {
        if (!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
      }

      // ============ DATA LOADERS ============

      async function loadData() {
        try {
          await Promise.all([loadChats(), loadNotes(), loadTasks(), loadWeather()]);
        } catch (error) {
          // Silently fail
        }
      }

      async function loadChats() {
        try { state.chats = await API.get('/chat/history'); } catch (e) { state.chats = []; }
      }

      async function loadNotes() {
        try { state.notes = await API.get('/notes'); } catch (e) { state.notes = []; }
      }

      async function loadTasks() {
        try { state.tasks = await API.get('/tasks'); } catch (e) { state.tasks = []; }
      }

      async function loadWeather() {
        try {
          state.weather = await API.get('/weather?city=London');
        } catch (e) {
          state.weather = null;
        }
      }

      async function loadAdmin() {
        try {
          const [users, stats] = await Promise.all([
            API.get('/admin/users'),
            API.get('/admin/stats')
          ]);
          state.adminUsers = users;
          state.adminStats = stats;
          render();
        } catch (error) {
          showToast('Failed to load admin data', 'error');
        }
      }

      function testConnection() {
        fetch(`${API.base}/health`)
          .then(res => res.json())
          .then(data => {
            showToast(`✅ Backend connected! Status: ${data.status}`, 'success');
          })
          .catch(err => {
            showToast(`❌ Connection failed: ${err.message}`, 'error');
          });
      }

      // ============ CLOCK ============

      function updateClock() {
        state.date = new Date();
        const clock = document.getElementById('clock');
        if (clock) clock.textContent = state.date.toLocaleTimeString();
      }

      // ============ EVENT BINDINGS ============

      function bindAppEvents() {
        // Sidebar navigation
        document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
          el.addEventListener('click', () => {
            state.currentPage = el.dataset.page;
            if (state.currentPage === 'admin') loadAdmin();
            render();
          });
        });

        // Tool navigation
        document.querySelectorAll('[data-tool]').forEach(el => {
          el.addEventListener('click', () => {
            state.toolActive = el.dataset.tool;
            state.toolResult = '';
            render();
          });
        });

        // Logout
        document.getElementById('logout-btn')?.addEventListener('click', () => {
          if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('jarvis_token');
            state.token = null;
            render();
            showToast('Logged out successfully', 'info');
          }
        });

        // Chat
        const sendBtn = document.getElementById('send-btn');
        const chatInput = document.getElementById('chat-input');

        if (sendBtn && chatInput) {
          const sendMessage = () => {
            const text = chatInput.value.trim();
            if (text && !state.isLoading) {
              chatInput.value = '';
              state.input = '';
              sendChatMessage(text);
            }
          };

          sendBtn.addEventListener('click', sendMessage);
          chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              sendMessage();
            }
          });
          chatInput.addEventListener('input', (e) => {
            state.input = e.target.value;
          });
        }

        // Voice toggle
        document.getElementById('voice-toggle')?.addEventListener('click', () => {
          state.voiceEnabled = !state.voiceEnabled;
          render();
          showToast(state.voiceEnabled ? 'Voice output enabled' : 'Voice output disabled', 'info');
        });

        // Stop button
        document.getElementById('stop-btn')?.addEventListener('click', () => {
          state.isLoading = false;
          render();
          showToast('Generation stopped', 'warning');
        });

        // Tools
        document.getElementById('tool-generate')?.addEventListener('click', async () => {
          const input = document.getElementById('tool-input');
          if (!input) return;

          state.toolLoading = true;
          state.toolResult = '';
          render();

          try {
            const endpoints = {
              'code': '/tools/generate-code',
              'image': '/tools/generate-image',
              'summarize': '/tools/summarize',
              'translate': '/tools/translate',
              'grammar': '/tools/fix-grammar'
            };

            const endpoint = endpoints[state.toolActive];
            if (!endpoint) {
              state.toolResult = 'Tool not available';
              state.toolLoading = false;
              render();
              return;
            }

            const data = await API.post(endpoint, {
              prompt: input.value,
              targetLang: 'Spanish',
              language: 'javascript',
              text: input.value
            });

            state.toolResult = data.code || data.url || data.summary || data.translated || data.fixed || 'Done!';
          } catch (error) {
            state.toolResult = `Error: ${error.message}`;
          }

          state.toolLoading = false;
          render();
        });

        // Notes
        document.getElementById('add-note')?.addEventListener('click', async () => {
          const title = prompt('Note title:');
          if (title) {
            const content = prompt('Note content:');
            try {
              await API.post('/notes', { title, content });
              await loadNotes();
              render();
              showToast('Note created!', 'success');
            } catch (error) {
              showToast('Failed to create note', 'error');
            }
          }
        });

        document.querySelectorAll('.delete-note').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this note?')) {
              await API.delete(`/notes/${btn.dataset.id}`);
              await loadNotes();
              render();
            }
          });
        });

        // Tasks
        document.getElementById('add-task')?.addEventListener('click', async () => {
          const title = prompt('Task title:');
          if (title) {
            try {
              await API.post('/tasks', { title, completed: false });
              await loadTasks();
              render();
              showToast('Task added!', 'success');
            } catch (error) {
              showToast('Failed to add task', 'error');
            }
          }
        });

        document.querySelectorAll('.toggle-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            const task = state.tasks.find(t => t._id === btn.dataset.id);
            if (task) {
              await API.put(`/tasks/${task._id}`, { ...task, completed: !task.completed });
              await loadTasks();
              render();
            }
          });
        });

        document.querySelectorAll('.delete-task').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Delete this task?')) {
              await API.delete(`/tasks/${btn.dataset.id}`);
              await loadTasks();
              render();
            }
          });
        });

        // Test Connection
        document.getElementById('test-connection')?.addEventListener('click', testConnection);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'k') {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            if (input) input.focus();
          }
        });
      }

      // ============ INIT ============

      // Check for existing session
      if (state.token) {
        API.get('/user/profile')
          .then(user => {
            state.user = user;
            render();
            setInterval(updateClock, 1000);
            loadData();
          })
          .catch(() => {
            state.token = null;
            localStorage.removeItem('jarvis_token');
            render();
          });
      } else {
        render();
      }

      // Expose for debugging
      window.__JARVIS = { state, API, render, sendChatMessage, showToast, CONFIG };

      console.log('🤖 J.A.R.V.I.S. v2.0');
      console.log(`📡 Backend: ${CONFIG.BACKEND_URL}`);

    })();
  </script>
